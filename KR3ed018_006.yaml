body:
  text: 卷之六千金論曰上醫醫未病之病中醫醫欲病之病下醫醫已病之病思以謂知病於未病之前者此上智之所能也知病於欲病之初者此中智之所及也若夫已病而求醫則常情同然不必論其智不智也孫氏曰聖人設教欲家家自學人人自曉尊親有疾不能療之者非忠孝也斯言可謂切至矣氣不調百病自生衆病積聚皆起於虛又曰虛生百病藥石有相欺者入人腹中遂相門爭力甚刀劍言不知性氣者不可服也凡服食藥餌須量自己性理所宜不可見彼得力我便服之人患瘡痍未瘳不得合陰陽婦人妊娠食羊肝令子多厄食山羊肉令子多病食驢肉延月食兔犬肉令子無音聲並缺唇食騾肉産難食雞子及干鯉魚令子多瘡食椹並鴨子令子倒出食雀肉並豆醬令子面多䵟𪒟黑子食雀肉飲酒令子心淫情亂不畏廉恥食鱉令子短項食冰醬絶胎多經大驚者生子患癲向非常地大小便必半産殺人穢汙死喪家人來看視産婦則難産傷兒不依産圖令子母多妨産乳若在反支月者浣濯水以器盛出此忌月方覆之産婦人衆看則難産臨産憂悒則難産兒已生不得自視穢汙便利干懸廁之上成十二痼疾産後百日內勿行房大忌上廁只室中上盆佳暑月産臥忌取涼百日忌服轉瀉藥月經不去大忌合陰陽生十二疾臥濕冷地大忌合陰陽生十二疾大忌以冷水洗浴合陰陽生十二疾小兒初生不以綿裹指拭口中青泥惡血則入腹生百病初生舉之遲則中寒臍帶隔衣咬斷之不得以刀子截臍帶留至足趺短則中寒下痢斷臍後浴者水入臍令兒腹痛臍帶中多有蟲不去之則入腹成疾臍留六寸長則傷肌短則傷臟臍不以時截及挼汁不盡則寒生臍風兒生男以父女以母故衣裹之過厚傷皮膚害血脈發雜瘡而黃新生兒衣暖太厚令筋骨緩弱解脫兒臍及換衣如冬月須閉戶生火三日朱蜜食多則脾胃冷腹脹喜陰癇氣急變噤而乖臍帶瘡未愈數洗浴令兒患陰頽兒太飽則吐及風中臍夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢母新房以乳兒令兒羸瘦交脛不能行母有熱以乳兒令變黃不能食母怒以乳兒令喜驚發氣疝又令上氣癲狂母新吐下以乳兒令兒虛羸母醉以乳兒令兒身熱腹滿乳兒當極挼散其熱氣勿令奔出乳兒不得用宿乳母欲寐則不得乳兒恐失飢飽及填兒口鼻也浴兒水不冷熱得所則令兒驚亦致五臟病兒冬不可久浴久浴則傷寒夏不可久浴久浴則傷熱數浴背冷則發癇小兒不浴又令兒毛落風癇者衣暖至汗出卻外風入腹為病因驚癇者驚怖大啼多為病因先不哺乳吐而變熱者為食癇新生無病懼不可逆針灸衣甚薄則乳食不消大便醋臭此欲為癖也乳哺食即作疾新生一歲兒外人來氣息忤之則為客忤病雖是家人或別房異戶從外還者不避之為客忤雖是乳母及父母從外來亦能令兒為客忤一應親戚及外來人有衣服經履鬼神粗惡暴氣或牛馬之氣並能令兒為客忤一應人執作喘息及乳母乳氣未定者並能為客忤乳母遇醉及房勞喘後乳兒最劇能殺兒凡諸乘馬行得馬汗氣息未盥洗易衣裝而便向兒邊者令兒中馬客忤一歲兒勿見馬來及聞馬鳴驚能令小兒作客忤兒衣布帛綿中及履中不得有頭髮白衣不得用青帶青衣不得用白帶皆能為客忤凡非常人及諸物從外來亦驚小兒致病欲防之法當將兒避之若不避者當燒牛屎令常有煙氣置戶前則善秋初夏末晨夕暴冷不避之多患壯熱下痢小兒解著傷風亦作傷寒病尋常晚夜及陰雨夜小兒衣物不得在露地有釣星鬼禽喜落毛羽於人中庭置兒衣中便令兒作癇病必死七八月尤忌兒生未能行而母再有娠使兒飲此乳作鬾病小兒飲食過度不知自止作疾小兒夏月積冷洗浴過度及乳母亦將冷水洗浴以冷乳飲兒兒壯熱忽值暴雨涼即令兒病痢等夏月暴寒小兒不避之入胃則暴病中客忤心腹脹滿刺痛口噤氣急停尸卒死者服張仲景備急丸人失明之本有十六件事生食五辛接熱飲食熱食麵食飲酒不已房室無節極目遠視數看日月夜視星火夜讀細書月下看書抄寫多年雕鏤細作博奕不休久處煙火泣淚過多刺頭出血過多又由馳騁田獵冒涉風霜迎風追獸日夜不息之所致也地因寒暑風濕皆作蒸氣人足履之謂之風毒名為腳氣婦人産後尤宜慎此四時之中不得久立久坐濕冷之地令人作腳氣病酒醉汗出脫衣靴襪當風取涼皆成腳氣患腳氣人忌大怒忌房室忌牛羊肉蒜蕺菜菘菜蔓菁瓠子酒面酥油乳糜豬雞鵝鴨不得犯之一方用鯉魚外魚亦忌又忌生果酸酢之食宜食生牛乳與生栗子及粳粱粟米醬豉蔥韭薤椒薑橘皮病有三患一患覺之晚二患驕狠恣傲三患狐疑不決犯之多枉傷性命故曰法為信者施不為疑者設欲臨近亡人宜將少金牙散塗鼻孔耳門及視疾者亦然亦宜帶絳囊一方寸匕男左女右新食畢取風者令人患胃風因醉取風者令人患漏風新沐浴畢取風者令人首風新房室畢取風者令人患內風尊貴人骨弱肌膚盛因疲勞汗出偃臥不時動搖被微風所及得血痹疾凡常之日忽然暴熱頓取涼快意生病亦然暴寒亦然冬時嚴寒最宜周密若觸冒之者為傷寒四時之氣皆能為病其傷寒尤重以其殺厲之氣故也辛苦之人春多患溫病以冬時多觸冒寒冷所致時行之氣犯之多病所謂時行之氣者春時應暖而反大寒夏時應熱而反大冷秋時應涼而反大熱冬時應寒而反大溫凡熱病大病新瘥之後食豬肉及羊血肥魚油膩等物必大下痢醫所不能治食餅餌粢黍飴脯鱠炙棗栗諸果物脯修及堅實難消之物胃氣尚虛弱不能消化必更結熱下之則大痢難禁不下之必死下之復危皆難治也不可不慎但得食糜粥寧少食令飢勿飽不得他有所食引日轉久可漸食羊肉白糜若羹汁雉兔鹿肉不可食豬狗肉當靜臥勿早起梳頭洗面非但不可體勞雖言語亦不得多亦不得生心用意煩勞凡上氣事並令人勞復女勞當舌吐數寸而死凡瘥未滿百日氣力未平復而以房室者略無不死未滿五日食一切肉面病更發大困食生魚鮓下痢必不止食生菜令人顏色終身不平復病新汗解飲冷水者損心胞令人虛補不復食生棗及羊肉者必膈上作熱蒸食犬羊等肉者骨中蒸熱食魚肉與瓜生菜令人身熱食鱠者病發必大困早起勞多及美飲食過多致發欲死谷疸者由失飢大食胃氣衝熏所致酒疸者由大醉當風入水所致女勞疸者由大勞大熱而交接畢入水所致黃疸有人以竹筒使人極吹病人鼻中者無不死大慎之夏傷暑至秋作痎瘧冬中於風寒氣藏於骨髓中至暑有所用力腠理開又中邪氣能作瘧肺有熱因有所作用力腠理開能令作瘧交接損令人卵縮筋攣食生物令蟲卵生入腹者成蟲蛇及魚鱉勞倦或飲食過常作吐血服藥吐利後常須閉口少語於無風處溫床暖食將息凡人執作汗出當風因以房室過度醉飲飽滿行事令心氣逼迫短氣脈悸得風癲病熱沐發而濕結之腦汗未止得濕癲病因大驚及當風從高墜下致喜悲善恐怖如有鬼物患有所擊僕若醉飽入房汗出當風則必傷脾凡患痢服止藥初服痢須轉劇愚人不解便不服其藥此誤也但服不過再三服之痢病通忌生冷酢滑豬雞魚油乳酪酥干脯醬粉鹽所食諸食皆須大熟爛為佳亦不得傷飽凡疳鹽醬酢酥油棗皆忌惟白飯豉苜蓿苦苣蕪菁不在禁限凡日月蝕時忌食飲腹中生䘌蟲及房室生子不具足必患月蝕瘡日月蝕不得與兒乳日月生後乃不忌令人口臭齒斷宣露常有血出舌上生瘡飲酒當風入肺膽氣妄泄即令人目青氣喘酒客勞倦當風喜怒氣舍於肺面目黃腫起即頭眩咳逆上氣時忽忽欲絶心下弦急不能飲食或吐膿血胸痛引背支滿欲嘔七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣此七種氣積聚堅大如杯若拌在心腹中疾痛不能飲食時來時去每發欲死如有禍祟尸疰鬼疰者即五尸之中尸疰也又挾諸鬼邪為害者也其大略令人寒熱淋瀝沉沉默默不的知其所苦而無處不惡纍年積月漸就頓滯以至於死死後復注易傍人乃至滅門覺如此候宜急療之人有九蟲其蟲凶惡人之極患也常以白筵草沐浴佳根葉皆可用既是香草又尸蟲所惡也凡服補藥及治諸病皆須先去諸蟲並痰飲宿澼醒醒除盡不爾必不得藥力脾勞熱有蟲在脾中令人好嘔肺勞熱生蟲在肺腎勞熱四肢腫急有蟲曰蟯蟲如菜中蟲在腎人得傷寒及天行熱病腹中有熱及人食少腸胃空虛若齒斷無色舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠當數看其上唇內有瘡唾血唇內如粟瘡者心內懊憹痛悶者此有三蟲在上蝕其五臟下唇內生瘡者其人喜眠此蟲在下蝕其下部人不能知可服蝕蟲藥不爾䘌蟲殺人熱病蛄毒令人喜寐不知痛處而面赤如醉下利膿血當數視其人下部大小之孔稷稷然赤則是䘌蟲也劇能殺人若有所用力舉重若入房過度汗出如浴水則傷腎人因身勞汗出衣里冷濕久而得腎著之病身體重腰以下如帶五千錢腰中冷如水又其人本來不吃忽然謇吃而好嗔恚反常性此腎之傷也取寒眠地臥冷濕地氣所傷則腰痛墜墮傷腰則腰痛房室後用則腰痛肝傷善夢心傷善忘脾傷善飲肺傷善痿腎傷善唾骨傷善飢肺傷善嗽遠思強慮傷人憂恚悲哀傷人喜樂過度傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒暄失所傷人五勞七傷有小腹急痛膀胱虛滿手足逆冷食飲苦吐酸痰嘔逆泄下少氣目眩耳聾口焦小便自利者虛損少氣腹脹內急拘引少腹至冷不得屈伸不能飲食寒熱頭痛手足逆冷大小便難或腹下痢口乾夢中泄精或時吐逆恍惚面色枯瘁又復微腫百節痠疼者五勞七傷虛羸不足面色黧黑手足疼痛久立腰疼起則目眩腹中懸急而有絶傷外引四肢者虛勞寒澼飲在脅下決決有聲飲已如從一邊下決決然也有頭並沖皮起引兩乳內痛裡急善夢失精氣短目䀮䀮忽忽多忘者五勞七傷小腹急臍下膨亨兩脅脹滿腰脊相引鼻口乾燥目暗䀮䀮憒憒不樂胸中氣急逆不下飲食莖中策痛小便黃赤尿有餘瀝夢與鬼神交通去精驚恐虛乏者凡男女有因積勞損或大病後不復常苦四體沉滯骨肉痠疼吸吸少氣行動喘惙或少腹拘急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味陰陽廢弱悲憂慘戚多臥少起者有大勞虛劣寒熱嘔逆下焦虛熱小便赤痛客熱上熏頭痛目疼骨肉痛口乾者有虛勞不足四肢煩疼不欲食食則脹汗出者有虛勞少氣胸心淡冷時時驚惕心中悸動手腳逆冷體常自汗腸鳴風濕者有虛勞損羸乏咳逆短氣四肢煩疼腰背引痛耳鳴面黧黑骨間熱小便赤黃心悸目眩者有大虛不足小便數噓吸焦燆引飲膀胱滿急者有左脅氣衝膈上滿頭上有風如蟲行手足頑痹鼻塞腳轉筋兩目時腫痛者有虛損短氣咽喉凝唾不出如膠塞咽喉者有五勞六絶其心傷者令人善驚妄怒無常者有五勞六絶其脾傷者令人腹滿喜噫食竟欲臥面目痿黃者有五勞六絶其肺傷者令人少精腰背疼四肢厥逆者有五勞六絶其肝傷者令人少血面黑者有五勞六絶其腎傷者有積聚少腹腰背滿痹咳唾小便難者六絶之為病皆起於大勞脈虛外受風邪內受寒熱令人手足疼痛膝以下冷者有五勞六絶腹中雷鳴時時泄痢者有五勞六絶或閉或痢面目腫心下憒憒不欲語憎聞人聲者有五勞七傷八風十二痹無有冬夏悲憂憔悴者凡是病皆須服之者有虛勞百損者有五勞六極七傷虛損者男子女人虛損傷絶頭目眩骨節煩痛飲食微少羸瘦百病者有虛勞腎氣不足腰痛陰寒小便數囊冷濕尿有餘瀝精自出陰痿不起忽忽悲喜者有五勞七傷六極強力行事舉重重病後骨髓未滿而行房室所食不消胃氣不平者有五勞七傷每事不如意者有陰下濕癢汗出或生瘡莖中痛者有溺血者有膀胱冷咳唾有血喉鳴喘息者有膀胱腎冷坐起欲倒目䀮䀮氣不足骨痿者有膀胱寒小便數漏精稠厚如白米泔者有胞屈僻津液不通者有尿白濁者有胞轉者有上焦熱腹滿而不欲食或食先吐而後下肘攣痛者有上焦飲食下胃汗出面背身中皆發熱者有上焦冷下痢腹內不安食好注下者有上焦閉塞乾嘔嘔而不出熱少冷多好吐白沫青涎吞酸者有中焦實熱閉塞上下不通隔絶關格不吐不下腹滿澎澎喘急者有中焦熱水穀下痢者有中焦寒洞泄下痢或因霍亂後瀉黃白無度腹中虛痛者有下焦熱大小便不通者有下焦熱或下痢膿血煩悶恍惚者有下焦熱毒痢魚腦雜痢赤白臍下小腹絞痛不可忍欲痢不出者有膀胱三焦津液不下大小腸中寒熱赤白泄痢及腰脊痛小便不利及婦人帶下者有下焦虛寒津液不止短氣欲絶者有下焦虛寒損或見血後便轉此為近血或利或不利有下焦虛寒損或先便轉後見血此為遠血或利或不利好因勞冷而發者有三焦虛損或上下發泄吐唾血皆從三焦起或熱損發或因酒發者有手足厥冷脈絶者有下焦虛寒損腹中瘀血令人喜忘不欲聞人語胸中噎塞而短氣者有吐下汗出而小便復利或下利清穀裡寒外熱脈微欲絶或發熱惡寒者凡霍亂務在溫和將息若冷則遍體轉筋此病定一日不食為佳仍須三日少少吃粥三日已後可依常食息七日勿雜食為佳所以養脾氣也有霍亂吐下脹滿食不消心腹痛者有霍亂吐利止而身體痛不休者有霍亂轉筋血冷汗出嘔啘者有霍亂吐利已斷汗出而厥四肢拘急不解脈微欲絶者有霍亂已服理中四順熱不解者有婦人霍亂嘔逆吐涎沫者慎不可下有年老霍亂羸劣冷氣噁心食飲不化心腹虛滿拘急短氣嘔逆四肢厥冷心煩氣悶而流汗者有毒冷霍亂吐利煩嘔轉筋肉冷汗出手足指腫喘息唾死絶語音不出者有霍亂蠱毒宿食不消積冷心腹煩滿鬼氣者有霍亂洞下不止者有霍亂引飲飲輒乾嘔者有先服石人因霍亂吐下服諸熱藥吐下得止因即變虛心煩手足熱口乾燥欲得水嘔逆迷悶脈急數者有時行熱病後毒未盡因霍亂吐下仍發熱心胸欲裂者有霍亂皆因飲食非關鬼神因飽食肫膾復餐乳酪海陸百品無所不啖眠臥冷席多飲寒漿胃中諸食結而不消所致思謂此說止為貴者言若貧下此證亦以瓜李生冷不慎致然霍亂人忌與米飲胃中得米即吐不止但與厚朴葛根飲若冬瓜葉飲但沾漬咽喉而不可多與若服湯時隨服吐者候吐定乃止診脈絶不通以桂合葛根為飲吐下心煩內熱汗不出不轉筋脈急數者可犀角合葛根為飲吐下不止發熱心煩欲飲水可少飲米粉汁為佳若不止可與葛根薺苨飲服之婦人霍亂嘔吐者霍亂四逆吐少嘔多者霍亂久將遠行預備者霍亂永不發丸者中熱霍亂暴利心煩脈數欲得冷水者陰陽二氣擁而反戾陽氣欲升陰氣欲降陰陽乖隔變成吐利頭痛如破百節如解遍體諸筋皆為回轉論證雖小卒病之中最為可畏雖臨深履危不足以喻之人生放恣者衆盛壯之時不自慎惜快情縱欲極意房中稍至年長腎氣虛竭百病滋生時服石散真氣既盡石氣孤立惟有虛耗唇口乾焦精液自泄或小便赤黃大便乾實所食之物皆化作小便此皆由房室不節之所致也熱結中焦則為堅下焦熱則為溺血令人淋閉不通氣淋之為病溺難澀常有餘瀝石淋之為病莖中痛溺不得出膏淋之為病尿似膏自出勞淋之為病勞倦即發痛引氣衝下熱淋之為病熱即發甚則尿血下焦結熱小便赤黃不利數起出少莖痛或血出溫病後餘熱及霍亂後當風取熱過度飲酒房勞及行步冒熱冷飲逐熱熱結下焦作淋及散石熱動關格小腹堅胞脹如斗諸有此淋悉治之立驗録忌如下喪孝産乳音樂一切魚一切肉喧戲房室酢滑生冷蒜黏食米豆油膩上並忌不得食及不得用心其不禁者並具本方之下再發若不爾若雖瘥復發復發不可治婦人産後飲水不即消三焦決漏小便不利仍相結漸漸生聚遂流諸經絡故也凡水病忌腹上出水出水者一月死大忌之水有十種不可治者有五第一唇黑傷肝第二缺盆平傷心第三臍出傷脾第四背平傷肺第五足下平滿傷腎熱結為淋者人氣急積久不瘥成水病者有患水腫腹大四肢細腹堅如石小勞苦足脛腫小飲食便氣急此終身疾不瘥服丹參亦可愈酒客有虛熱當風飲泠水腹腫陰復脹滿者水病有通身洪腫者流腫者百藥治不瘥而欲死者有大腫眼合不欲開短氣欲絶者男子女人新久腫得暴風入腹者婦人新産上廁風入臟腹中如馬鞭者噓吸短氣咳嗽者耆婆萬病丸牛黃麝香犀角一方云一銖今各一分桑白皮茯苓乾薑桂心當歸芎藭芍藥甘遂黃芩蜀椒細辛桔梗巴豆前胡紫菀蒲黃葶藶防風各一分蜈蚣三節石蜥蜴人參一寸硃砂雄黃黃連大戟芫花禹餘糧芫青七枚上三十一味並令精細牛黃麝香犀角硃砂雄黃禹餘糧巴豆別研余者合搗絹下篩以白蜜和更搗三千杵密封之破除日平旦空腹酒服三丸如梧子大取微下三升惡水為良若卒暴病不拘平旦早晚皆可服但以吐利為度若不吐利更加一丸或至三丸五丸須吐利為度不得限丸數病強藥少即不吐利更非他故若其發遲以熱飲汁投之若吐利不止即以醋飯兩三口止之服藥忌陳臭生冷醋滑黏食大蒜豬雞魚狗牛馬驢肉白酒行房七日外始得一日服二日補之得食新米韭骨汁作羹粥臛食之三四頓大良亦不得全飽産婦勿服吐利以後常須閉口少語於無風處溫床暖室將息若旅行卒暴無飲以小水送之為佳若一歲以下小兒有疾者令乳母服兩小豆亦以吐利為度近病及卒病皆用多積久疾病即少服常取微溏利為度崔氏無黃芩桑白皮桔梗防風為二十七味萬病丸治症開録如下卒病欲死蠱毒吐血腹痛如刺卒中惡口噤五疰鬼刺客忤貓鬼瘧病未發前一日諸有痰飲患冷癖宿食不消癥瘕積聚拘急心腹脹滿心痛上氣喘逆胸滿不得臥傷寒時行大痢疳濕水病頭痛惡寒小便不通大便不通耳聾聤耳鼻衄癰腫疔腫犯疔腫血出胸背腰脅腫癩瘡用萬病丸敷之瘻瘡痔瘡冷瘡積年不瘥者癬瘡惡刺蝮蛇螫蠍螫蜂螫婦人諸疾胎衣不下小兒客忤小兒驚癇小兒乳不消心腹脹滿仙人玉壺丸雄黃藜蘆丹砂礬石一作礬石巴豆八角附子各二兩上六味先搗巴豆三千杵次內礬石又搗三千杵次內藜蘆三千杵次內附子三千杵次內雄黃三千杵次內丹砂三千杵內蜜又搗萬杵若不用丹砂內珍珠四兩無在每內藥輒治五百杵內少蜜恐藥飛揚治藥用王相吉日良時童子齊戒為良天晴明日無雲霧白晝藥成封密器中勿泄氣著清潔處大人服丸如小豆欲下病者宿勿食平旦服二丸不知者以粥飲發之令下下不止飲冷水以止之病在膈上吐膈下利或但噫氣即已若欲漸除及將服消病者如麻子大三丸卒中惡欲死不知人以酒若湯和二丸強開口灌喉中鬼疰病百種不可名漿水服二丸日再玉壺丸治症開録如下男女與鬼交通歌哭無常腹中若有蟲欲鑽脅出狀急痛一止一作憂恚氣結在胸心若連噫及咳胸中刺痛心腹切痛及心中熱澼飲痰飲諸疝卒上氣氣但出不入並逆氣衝喉胃中暴積聚癥結堅痞積寒熱痞食肉不消腹堅脹腹中三蟲下痢重者卒關格不得大小便欲死瘧已發未發卒霍亂心腹痛煩滿吐下手足逆冷寒熱往來傷寒敕澀時氣熱病淋漓疲瘦百節痠疼頭卒風腫癰疽痤癤瘰癧及欲作瘻鼠瘻中水毒齒痛耳聾膿血汁出及卒聾風目赤或癢視物漠漠淚出爛眥中蠱毒吐血腹內如刺中蛇蝮諸毒猘犬所咋狂馬所咋婦人産後余疾及月水不通往來不時婦人胸中苦滯氣氣息不利小腹堅急繞臍絞痛小兒百病驚癇痞塞及有熱小兒大腹及中熱惡毒食物不化結成積聚小兒寒熱頭痛身熱及吐哯小兒羸瘦丁奚不能食食不化欲問人孝省人病先服之及系頭上頭上系玉壺丸闢百鬼獨宿山澤冢墓廟社叢林之中燒一丸百鬼走去以蠟和一丸如彈丸著絳囊係臂男左女右山精鬼魅皆畏之千金須知中慢驚為陰癇緩縱為痱淋為癃黃為疸強直為痓喘嗽為咳逆膈氣為膏肓熱死為暍怔忡為悸利為滯下臟毒為痢之蠱毒腸風為腸滯下血咳逆為噦逆服金石藥為服石度者量也漬者浸也和者調也敷者塗也暴者曬也㕮咀者稱畢細切也三兩者今之一兩三升者今之一升方寸匕者正方一寸散子以不落為度錢匕者五銖銅錢上全抄也錢五匕者今五銖錢邊五字者以抄之令不落為度半錢匕者一錢抄取一邊梧桐子大者以二大豆准之刀圭者如梧桐子大一撮者四刀圭如彈丸如雞子者十梧桐子准之一升者取平升為正一把者二兩草一束者三兩桂一尺者削去皮半兩甘草一尺者二兩蜜一斤者有七合豬膏一斤者二升二合半夏一升者洗畢五兩椒一升者三兩吳茱萸一升者五兩菟絲子一升者九兩菴䕡子一升者四兩蛇床子一升者三兩半地膚子一升者四兩巴豆以枚計者去皮心二分淮豆六枚附子烏頭以枚計者去皮半兩淮二枚枳實以枚計者去穰二分淮二枚棗三枚淮一兩生薑一纍半兩
