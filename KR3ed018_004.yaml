body:
  text: 卷之四瘧痢症等第十三凡下痢熱烏梅一升黃連一斤金色者末之蜜和如梧子大二十丸日三夜二積久三十年常下痢赤松皮去上蒼皮切一斗為散面粥和一升日三服百日瘥下血日夜百七八十行黃連黃柏各四兩㕮咀醇酢三升煮取一升半分再服赤白滯下亂髮雞子大燒末水服不過三下冷臍下攪痛赤石脂乾薑各十兩丸如豌豆服十丸日三加至二十丸卒下痢黃連五兩生薑一斤㕮咀以水五升煮取一升頓服未止更服久冷白痢日夜五六十行大小腹痛不可忍好曲末五升微熬令香溫清酒令熱和曲末一升空腹頓服日三服若至食時搗蒜一升令至熟下薑椒調和如常食法惟須稠勿加鹽以水和曲二升作索餅極爛煮之干漉熱內蒜齏臼中相合一頓食之少與餘食至飢時仍准前食曲末酒比至瘥不過兩日久冷或痢或不痢但患腰腹苦冷者上等新蜀椒三升用酢宿漬之以曲三升和椒一升緊拌煮作粥空腹頓服之加蔥豉鹽任性調和不瘥更作以瘥為限不過三升椒即愈此不但治冷大治諸虛損冷極有所益久當自知耳瘧或間日或夜發者燒黑牛尾頭毛作灰酒服方寸匕日三又方無問新久者小便一升半蜜三匕同煮三沸頓服每發日平旦時服自至發勿食重者漸退不過三服瘥一切瘧無問遠近正仰臥以線量乳間中屈從乳向下灸度頭隨年壯男左女右五臟諸瘧灸尺澤七壯穴是肘約上動脈禳瘧法未發前抱一大雄雞時時驚動令雞作大聲立瘥卒暴症腹中有物堅如石痛如斫刺晝夜啼呼不治百日必死牛膝二斤㕮咀曝之令乾以酒一升浸之密塞氣口煎取半服半升一服便吐去宿食神效又卒暴症取商陸根搗碎蒸之以新布藉腹上以藥鋪布上以衣物覆藥上冷復易之數日勿息凡所食不消取其餘類燒作末酒服方寸匕便吐去宿食即瘥如食桃不消者以時無桃就樹間得槁桃燒服亦可卒食不消欲成瘕積者煎艾汁如飴取半升作一服便利吐去宿食神良又方白艾五尺圍一束薏苡根一大把二味煎服食魚肉等成癥結並諸毒氣狗屎五升燒末綿裹之以酒一斗浸再宿濾取清分十服日三服三日使盡隨所食便出矣雜中食瘀實不消心腹堅痛以水三升煮白鹽一升令消分三服自吐亦治暴症患癥結病及瓜病似瓜形日月形或在臍左右或在臍上下若鱉在左右肋下或當心如合子大先針其足以椒尉之取一新大盆受一斗者盆底鑽一百二十孔孔上著椒三合上著一重紙紙上著冷灰一升灰上著熱灰半升上著剛炭火一斤經一食頃盆底熱徹當病上初安氈一重即安火盆火盆大熱以漸更加一重若火更熱不可忍加至三重暫歇一口冷飲還上火消二分許即停經三日勿著及至七日決得頓瘥然後食美食自補若小不瘥作露宿丸服之方在第十六卷中鱉症腹堅硬腫起大如盆眠臥不得取藍一斤搗水三升絞取汁服一升日二又方蒴藋根白皮一握研取汁水和服之食中得病為鱉症在心下堅強雞屎一升炒黃取五合以酒一升浸半為末以所浸酒服方寸匕日二三日中作一劑蛟龍病開皇六年三月八日有人食芹得之其人病發似癲癇面色青黃因食寒食餳過多便吐出蛟龍有頭及尾從茲有人患此疾令服寒食餳二斗大驗米症常欲食米若不得米則胸中清水出雞屎一升白米五合合炒令米焦搗末以水二升頓服取盡須臾吐出病如研米若無米當出痰自此永憎米不復食頭風吐逆第十四凡食後吐酸水乾薑茱萸各二兩治篩酒服方寸匕日二胃冷服之立驗嘔噦蘆根切三升以水一斗煮取四升分四服乾嘔吐逆涎沫出者半夏乾薑等分㕮咀以漿水一升半煮取七合頓服之日三乾嘔酒浸馬屎一宿取汁服之又方灸心主尺澤亦佳又方灸乳下一寸三十壯乾嘔不止粥食湯藥皆吐不停灸手間使三十壯若四厥脈沉絶不至者灸之便通此起死人法治噦煮豉三升飲汁佳又方空腹飲薑汁一升又方濃煮蘆根汁飲之又方灸承漿七壯炷如麥大又灸臍下四指七壯噁心苦瓠穰並子一升碎以酒水三升煮取一升頓服須臾吐下如蝦䗫衣三升又方服小便百日佳又方麻子一升熬令香熟搗取酒三升熟研濾取一升飲盡日二服盡一石瘥一切病自能食飲不能酒者任性多少食飲輒吐頓服生熟湯三升即止吐逆食不住灸胃管百壯三報吐逆飲食卻出灸脾募百壯三報章門也咽痛逆氣不能食麻子一升熬令黑以酒一升淋取汁空心一服一升漸至二升多汗好覆勿觸風冷此方兼理産婦及丈夫中風如角弓反張口噤不開治婦人氣平旦服烏牛尿日一止腰痛以酒單服鹿茸與角方寸匕日三腰䐴痛導引法正東坐收手抱心一人於前據躡其兩膝一人後持其頭徐牽令偃臥頭到地三起三臥止便瘥腰痛針法宜針決膝腰句畫中青赤絡脈出血便瘥又方灸腳跟上橫紋中白肉際十壯良又方灸足巨陽七壯巨陽在外踝下又方灸腰目窖七壯在尻上約左右又方灸八窖及外踝上骨約中腰卒痛灸窮骨上一寸七壯左右各一寸七壯頭風大豆三升炒令無聲先以一斗二升瓶盛清酒九升乘豆熱即傾酒中密泥頭七日溫服之又方服荊瀝不限多少取瘥止又方搗蒴翟根一升酒二升漬服汗出止又方末蔓荊子二升酒一升絹袋盛浸七宿溫服三合日三又方臘月烏雞屎一升炒黃末之絹袋盛以酒三升浸溫服任意常令醺酣又方七月七日麻勃三升麻子一石末相和蒸之沸湯一石五斗三遍淋之煮取一石神麯二十斤漬之令發以黍米兩石五斗釀之熟封三七日服清一升百日身中澀皮入風胸膈五臟骨髓伏風百病悉去之頭風沐方葶藶子煮沐不過三四度愈又方蜀椒二升以水煮取汁沐發良白屑以桑灰汁沐頭去白屑神良白髮還黑烏麻九蒸九曝末之以棗肉丸久服之佳又方隴西白芷旋覆花秦椒各一升桂心一尺治下篩以井花水服方寸匕日三三十日白髮還黑禁房室
