body:
  text: 卷之一婦人第一妊娠難産燒車釭脂內酒中服亦治腹中痛並咳嗽妊娠忽苦心腹痛燒鹽令赤熱三指撮酒服之立産又方吞槐子二七個又方菟絲子或車前子末以酒或米汁服方寸匕即生又方水或酒服家中黑塵子死腹中及小難橫生倒生難生者半夏白蘞各二兩末之服方寸匕亦可加代赭瞿麥各二兩佳小難一服橫生二服倒生三服子死四服又方榆白皮細切煮三升服之子死衣不出上搶心者急取蟻蛭土三升熬之令熱囊盛尉心良又方末灶突中墨三指撮水或酒服之乳無汁者土瓜根末之一服半錢匕日三衣不出及橫生逆生者小麥小豆煮濃汁飲立出産三日不出者燒大刀環以酒一盞沃之頓服又方燒藥杵令赤內酒中飲之救死不分娩者産乳暈絶者制了半夏一兩末之丸如大豆內鼻孔中愈又方神麯末水服方寸匕又方含釅醋噀面子死腹中牛屎塗母腹上立出胎死腹中服水銀三兩立出未足月而胎死者以苦酒濃煮大豆一服一升死胎立出妊娠時疾子不下灶中黃土水或酒或泔清調塗臍方寸干再上又方酒服車轄脂又方蔥白一把水三升煮熟食蔥令盡亦安胎胎死者即出妊娠中蠱燒敗鼓皮酒服方寸匕妊娠傷寒蔥白十莖生薑二兩切水三升煮去半服取汁産後血不盡煩悶搗生藕取汁飲二升良産後腹脹痛者煮黍黏根為飲一服即愈五色帶下者煮甑帶汁服一杯良月水不斷灸內踝下白肉際青脈上隨年壯又方服地黃酒良或大豆酒亦佳月水不利及無子灸四滿三十壯穴在丹田兩邊相去各一寸半丹田在臍下二寸漏下積年困篤者取鵲重巢燒灰末之服方寸匕日三服三十日愈重巢者連二年鵲産其上者是産後月水往來多少不定或不通痛小腹急腰身重白馬尿一升服之良逆生橫生者灶下黃土三指撮酒服立出小兒第二凡小兒生下不啼者取兒臍帶向身卻捋之仍呵之百度亦可以蔥白鞭之浴新生兒以豬膽一個汁入湯中令兒無瘡疥小兒生輒死者便覷兒口中懸癰前上齶有胞者急以指摘取頭決令潰去血勿令血入咽入咽即殺兒慎之小兒臍不合燒蜂房灰末敷之小兒中風口噤雀屎如麻子丸之飲下即愈兒生三日內朱蜜多則生陰癇朱蜜三日內通得用三豆許朱蜜後與牛黃亦三豆許除兒百病牛黃後可與米飲研米作厚飲如豆大與兒三豆許止日三七日後方哺乳小兒解顱熬蛇蛻皮末之和豬頰車中髓敷頂上日三四小兒肚皮卒然青黑以酒和胡粉敷上若不急治須臾便死又方灸臍左右上下各半寸並鳩尾骨下一寸凡五處各三壯小兒暴脹欲死半夏隨多少微炮之為末酒丸如粟米大五丸日三小兒丹毒搗慎火草絞取汁塗之小兒赤遊腫若遍身入心腹殺人搗伏龍肝為末以雞子白和敷之干易之又方白豆末水和敷之勿令乾又身赤腫起者熬米粉令黑以唾和敷之小兒傷寒發黃搗土瓜根汁三合服之又方搗青麥汁服之又方搗韭根汁澄清滴兒鼻中如大豆許即出黃水瘥小兒霍亂研尿滓乳上服之又方牛涎灌口中一合小兒客忤吞麝香大豆許立愈又方以母月衣覆兒上大良又方取牛鼻津服之又方取牛口沫敷乳頭飲之又方取熱馬屎一丸絞取汁飲兒下便愈亦治𠸯啼面青腹強者小兒誤吞針取磁石如棗核大吞之或含之其針立出誤吞鐵物等艾蒿一把挫以水五升煮一升半服之即下誤吞發亂髮燒灰酒服一錢吞錢艾蒿五兩以水五升煮取一升頓服之即下又方末火炭酒服方寸匕水服亦得又方服蜜二升即出吞金銀叉環白糖二斤一頓漸漸食之多食益佳又方吞水銀一兩再服之吞環及指彄燒雁毛二七個末服鵝毛亦得吞環暴韭令萎蒸熟勿切食一束即出或生麥葉筋縷如韭法皆可用但力意多食自消吞銅鐵而哽燒銅弩牙令赤內酒中飲之立愈吞釘針及箭鏃等但多食脂肪肉令飽自裹出吞針取懸針磁石末飲服方寸匕即下小兒尿灶丹初起兩股入臍陰頭皆赤者水二升桑皮切二升煮取汁浴之良又方燒李根為灰以田中流水和敷之良小兒朱田火丹一日夜即成瘡先從背漸遍身如棗大赤者濃煮棘根洗之已成瘡者赤小豆末敷之小兒野火丹遍身皆赤者用油塗之小兒茱萸丹初起背遍身如纈一宿成瘡者煮赤小豆作末以敷之小兒廢灶火丹初起足趺正赤色者以棗根煮汁沐浴五六度自愈小兒風瘙隱疹心迷悶巴豆二兩以水七升煮取三升故帛染汁拭之大人加減用之又方礬石二兩末之酒三升漬令消帛染拭病上又方吳茱萸一升酒五升煮取一升半帛染拭病上小兒隱疹入腹體強舌乾蕪菁子末酒服方寸匕日三又方蠶砂二升水二升煮去渣洗之又方鹽湯洗了以蓼子挼敷之又方車前子作末敷之諸丹毒渠中藻菜細切熟搗敷丹上厚三分干易之又方蕓薹菜熟搗厚封之隨手即消如餘熱氣未愈但三日內封之使醒醒好瘥止五色油丹縛母豬枕頭臥之良又方牛屎塗之干則易之赤流腫搗火麻子水和敷之又方以羊脂煎了磨之赤黑丹起遍身者殺人小兒瘡初起熛漿似火瘡熟搗桃仁以面脂和敷之亦治遍身赤腫小兒身體頭面生瘡榆白皮隨多少曝令乾末之醋和塗綿以敷瘡上蟲自出小兒丹毒馬齒莧一握搗取汁飲之以滓敷之又方搗赤小豆五合水和取汁飲之一合良滓塗五心又方濃煮大豆汁塗之良瘥亦無瘢痕又方臘月豬脂和釜下土敷之干則易之小兒五色丹搗蒴藋葉敷之又方薤白一把豉一升以水三升煮取二升分三服又方柏葉一升麻子末一升以水五升煮三沸百日兒每服三合又方搗石榴汁服之又方亂髮灰鹿角灰等分三歲兒以水和服三錢匕日二小兒赤白痢單服生地黃汁一合小兒熱痢煮木瓜葉飲之小兒冷痢蓼菜搗汁量大小飲之一作芥菜又方搗蒜敷兩足下小兒暴痢赤小豆末酒和塗足下日三油和亦得小兒蠱毒痢藍青汁一升二合分為四服飲之小兒渴痢搗木瓜汁飲之小兒頭不生髮楸葉搗汁敷之小兒瘻瘡家中石灰厚敷之小兒浸淫瘡以灶下黃土發灰等分末之以豬脂和敷之小兒疥瘡以臭酥和胡粉敷之小兒濕癬煎馬尿洗小兒斑瘡入眼浮萍陰乾為末以生羊子肝半個入盞內以杖子刺碎沒水半合絞取肝汁食後調下不甚者一服已傷目者十服見效大人亦可用小兒赤熱腫目川大黃白礬朴硝等分為末冷水調作掩子貼目上小兒重舌腫起舌下以朴硝研水敷咽喉外其內用成塊者含涎出乃平又方地蜱蟲和薄荷研汁帛包蘸舌下腫起重舌極證用指去爪先於舌下筋上擦至根漸深深擦如此三次又用手蘸水取項後燕窠小坑中筋自上趕下至小窟深深擦入三次小兒若飲乳勝前則病去矣小兒禿瘡及惡瘡以苦楝皮燒灰以豬脂調敷大人惡瘡亦可用小兒卵腫偏墜防風牡丹皮等分為末每服二錢匕溫酒調服鹽湯亦可小兒卒客忤以灶中黃土蚯蚓糞等分研細水調塗兒頭上及五心良又方米粉鹽等分炒變色腹上摩之小兒頭瘡經年不瘥者取屋塵末和油瓶下滓以皂角湯洗敷之小兒頭瘡胡粉一兩黃連二兩末之洗瘡去痂拭乾敷之即瘥再發再敷之禿瘡葶藶子細末先洗敷之小兒惡瘡熬豉令黃末之敷瘡上不過三敷愈小兒手足及身腫者以小便溫暖漬之即愈又方巴豆五十枚去心皮以水三升煮取一升以綿內湯中拭病上隨手消並治隱疹小兒脫肛灸頂上旋毛中三壯即入又方灸尾翠骨三壯又方灸臍中隨年壯小兒疳瘡嚼麻子敷之日六七度小兒濕瘡濃煮地榆汁洗浴日兩度小兒尿血燒鵲巢灰井花水服之亦可治尿床小兒解顱豬牙頰車髓敷囟上差小兒風瘙隱疹牛膝末酒服方寸匕漏瘡多年不瘥搗末敷之亦治骨疽癲疾瘰癧絶妙小兒胎寒𠸯啼驚癇腹脹不嗜食大便青黃並大人虛冷或有實不可吐下者馬齒礬一斤燒半日以棗膏和大人服如梧子二丸日三小兒以意減之以腹內溫為度小兒五色丹豬槽下爛泥敷之干則易之以愈為度又方服黃龍湯二合並敷瘡上小兒赤丹蕓薹葉汁服三合滓敷上小兒赤丹斑駁唾和胡粉從外向內敷之良又方鍛鐵屎為末以豬脂和服之又方屋塵以臘月豬脂和敷之小兒火丹赤如朱走皮中酢和豉研敷之即愈又方搗荏子敷之又方豬屎水和絞取汁服少許小兒天火丹赤如丹大如手遍身或痛或癢生麻油塗之小兒骨火丹其瘡見骨者搗小蒜厚封之著足踝者是小兒殃火丹每著兩脅及腋下者伏龍肝末和油敷之干則易之若入腹及陰則以慎火草取汁服之小兒夜啼不已醫所不治者取狼糞中骨燒作灰末水服如黍米大二枚其啼即已又方取馬骨燒灰敷乳上飲兒即止小兒吐痢燒特豬屎水解取汁少少服之良小兒大小便不通灸口兩吻各一壯又方搗白花胡葵子末煮汁服之又方雞屎白服一錢匕又方灸臍下一寸三壯又灸橫紋百壯又灸口兩吻各一壯小兒溫瘧鹿角末先發時便服一錢匕又方灸兩乳下一指三壯小兒洞注下痢蒺藜子二升搗汁溫服以瘥為度又方木瓜搗汁飲之又方炒倉米末飲服之又方酸石榴燒灰服半錢匕日三又方炒豉令焦水淋汁服之神驗冷則酒淋服小兒赤白滯下薤白一把豉一升以水三升煮取一升分三服又方柏葉一升麻子末一升以水五升煮取三沸百日兒每服三合又方搗石榴汁服之又方亂髮灰鹿角灰等分三歲兒以水和服三錢匕日二中毒第三凡卒死無脈無他形候牽牛臨鼻上二百息牛舐必瘥牛不肯舐鹽汁塗面上即牛肯舐又方牛馬屎絞取汁飲之無新者水和乾者亦得一法以人溺解之又方炙尉斗尉兩脅下又治尸厥魘死慎燈火勿令手動牽牛臨其鼻上即覺又方搗韭汁灌鼻孔中劇者灌兩耳一云灌口中鬼魘不悟末伏龍肝吹鼻中又方末皂角如大豆許吹鼻中嚏則氣通起死人亦治中惡又方灸兩足大指叢毛中二七壯亦救卒死中惡中惡蔥心黃刺鼻孔中血出愈一云入七八寸無苦使目中血出差一云男左女右又方使人尿其面上愈中惡並蠱毒冷水調伏龍肝如雞子大服之必吐又方溫二升豬肪頓服之又方車釭脂如雞子大酒服之又法中惡灸胃管五十壯愈卒忤中惡也鹽八合以水三升煮取一升半分二服得吐即愈若小便不通筆頭七枚燒作灰末水調服即通又方犢子屎半盞酒三升煮服之亦治霍亂一云治鬼擊又云大牛屎亦可用又方書墨末之水服一錢匕又法卒忤死灸手十指爪下各三壯又灸人中三壯又灸肩井百壯又灸間使七壯又灸巨闕百壯卒中鬼擊及刃兵傷血漏腹中煩滿欲絶雄黃粉酒服一刀圭一日三服血化為水鬼擊之狀卒著人如刀刺胸腹絞痛或吐血或口鼻血出或下血雞屎白如棗大青花麻一把以酒七升煮取三升熱服須臾發汗不汗尉斗盛火灸兩肋下熱汗出愈又方艾如雞子大三枚以水五升煮取二升頓服又方吹酢少許鼻中救自縊死極須按定其心勿截繩徐徐抱解之心下尚溫者以氍毹覆口鼻兩人吹其兩耳立活又方僵臥以物塞兩耳竹筒內口中使兩人痛吹之塞口傍勿令氣出半日死人即噫噫即勿吹也又方搗皂角細辛屑如胡豆大吹之兩鼻中又方搗藍青汁灌之又方刺雞冠血出滴之口中即活男雌女雄又方雞血塗喉下又方雞屎白如棗大酒半盞和灌口及鼻中佳又方蔥葉吹皂角末兩鼻中逆出更吹乃可又方梁上塵如大豆各內一小竹筒子中四人各捉一個同時吹兩耳兩鼻中即活又方尿鼻口眼耳中並捉頭髮如筆管大一撮制之立活又方自縊死灸四肢大節陷大指本文名曰地神各七壯熱暍著熱死者取道上熱塵以壅心上若少冷即易氣通即止又方仰臥暍人熱土壅臍上令人尿之臍中溫即愈又方可飲熱湯亦可內少乾薑橘皮甘草煮飲之稍稍咽勿使飽但以熱土及熬灰土壅臍上佳又方濃煮蓼取汁三升飲之即愈如不愈再飲又方地黃汁一盞服之即愈又方水半盞和麵一大抄服之又方張死人口令通以暖湯徐徐灌口中小舉死人頭令湯入腹須臾即蘇又方灌地漿一盞即愈又方使人噓其心令暖易人為之又方抱狗子或雞著心上尉之又方屋上南畔瓦熱尉心冷易之救落水死者以灶中灰布地令厚五寸以甑側著灰上令死人伏於甑上使頭少垂下抄鹽二方寸匕內竹管中吹下孔中即當吐水水下因去甑下死人著灰中壅身使出鼻口即活又方掘地作坑熬數斛灰內坑中下死人覆灰濕徹即易之勿令大熱爆人灰冷更易半日即活又方取大甑傾之死人伏其上令死人口臨甑口燃葦火二七把燒甑中當死人心下令煙出小入死人鼻口中鼻口中水出盡則活火盡則復益之常以手候死人身及甑勿令甚熱當令火氣能使死人心下足得暖卒無甑者於岸側削地如甑空下如灶燒令暖以死人著上亦可用車轂為之勿令隱其腹令死人低頭水得出並炒灰數斛令暖以粉身濕更易溫者又方但埋死人暖灰中頭足俱沒惟開七孔又方倒懸死人以好酒灌鼻中又灌下部又醋灌鼻亦得又方綿裹皂角內下部中須臾水出又方裹石灰內下部中水出盡則活又方熬沙覆死人面上下有沙但出鼻口耳沙冷濕即易又方倒懸解去衣去臍中垢極吹兩耳起乃止又方灶中灰二石埋死人從頭至足出七孔即活又方屈兩腳著生人兩肩上死人背向生人背即負持走行吐出水便活又方落水死解死人衣灸臍中凡落水經一宿猶可活冬月落水凍四肢直口噤有微氣者以大器中熬灰使暖盛以囊薄其心上冷即易心暖氣通目得轉口乃開可溫尿粥稍稍吞之即活若不先溫其心便持火灸身冷氣與火爭即死卒中惡風心悶煩毒欲死者急灸足大趾下橫文隨年壯即愈上件病若筋急不能行者內踝筋急灸內踝上四十壯外踝筋急灸外踝上三十壯立愈卒中惡風眼戴睛灸目兩眥後二七壯上件病若不識人者灸季肋頭七壯卒中惡心痛苦參三兩㕮咀以好酢一升取八合強人頓服老小二服又方桂心八兩㕮咀以水四升煮取一升半分作二服飲食中毒第四凡諸食中毒飲黃龍湯及犀角汁無不治也飲馬尿亦良又方食百物中毒掘地坑中著水取以飲之又方含貝子一枚須臾吐食物瘥又服生韭汁數升亦得中毒煩悶苦參三兩㕮咀以酒二升半煮一升頓服之取吐愈食六畜肉中毒各取六畜干屎末水服之佳食自死六畜肉毒服黃柏末方寸匕須臾復出又方燒小豆一升末服三方寸匕又方水服灶底黃土方寸匕食生肉中毒掘地深三尺取下土三升以水五升煮土五六沸取上清飲一升立愈食牛肉中毒狼牙灰水服方寸匕一作豬牙又方溫湯服豬脂良又方水煮甘草汁飲之食馬肉血洞下欲死豉二百枚杏仁二十枚㕮咀蒸之五升米下飯熟搗之再服令盡又方蘆根汁飲以浴即解食豬肉中毒燒豬屎末服方寸匕犬屎亦佳食百獸肝中毒頓服豬脂一斤佳食陳肉毒方同上食馬肝中毒牝鼠屎二七枚兩頭尖者是以水研飲之不瘥更作食野菜馬肝肉諸脯肉毒取頭垢如棗核大吞之可起死人又方燒狗屎灰水和絞取汁飲之立愈又方燒豬骨末之水服方寸匕日三茅屋漏水沾脯上有毒搗韭汁服之良大豆汁亦得肉閉在密器中者名郁肉有毒燒狗屎末水服方寸匕凡生肉熟肉皆不藏蓋不泄氣皆殺人又肉汁在器中密蓋氣不出亦殺人脯在黍米中有毒曲一兩水一升鹽兩撮煮服之食中射罔脯毒末貝子水服如豆佳不瘥又服食餅臛中毒方同上以肉作餅臛食多吐下服犀角末方寸匕甚良食鵝鴨肉成病胸滿面赤不下食者服秫米泔大良食中魚毒煮橘皮湯停極冷飲之其效甚大食中魚毒及中鱸魚毒銼蘆根舂取汁多飲良亦可取蘆葦茸汁飲之蟹毒方同上又冬瓜汁服二升亦可食冬瓜山中木菌毒人屎汁服一升良食魚膾不消燒魚鱗水服方寸匕食諸鮑魚中毒方同上食牛馬肉中毒飲人乳汁良酒病豉蔥白各一升以水四升煮取二升頓服之飲酒中毒煮大豆三沸飲汁三升又方酒漬干栮汁服之酒醉不醒葛根汁一斗三升飲之取醒止又治大醉連日煩毒不堪
