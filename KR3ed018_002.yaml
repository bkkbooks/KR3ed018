body:
  text: 卷之二解百藥毒第五凡解百藥毒甘草薺苨大小豆汁藍汁藍實汁藍根汁並解雄黃毒防己解礜石毒大豆汁解金銀毒服水銀數兩即出鴨屎解水和雞屎汁煮蔥汁並解鐵粉毒磁石解防葵毒葵根汁解桔梗毒白粥解甘遂毒大豆汁解芫花毒防己防風甘草桂汁並解大戟毒菖蒲汁解蜀椒毒葵子汁桂汁豉汁人尿冷水土漿蒜雞毛燒吸烟及水調服解斑蝥芫青毒豬脂大豆汁或鹽藍汁鹽湯煮豬骨並解馬刀毒清水解杏仁毒藍子汁解野芋毒土漿人糞汁解諸菌毒掘地作坑以水沃中攪之令濁澄清飲之名地漿解解鴆毒及一切毒藥不止者甘草蜜各四兩粱米粉一升以水五升煮甘草取二升去滓歇大熱內粉湯中攪令勻調內白蜜更煮令熟如薄粥適寒溫飲一升最佳解一切毒母豬屎水和服之又水三升三合和米粉飲之野葛毒已死口噤者取青竹去兩節柱兩脅臍上內冷水注之暖即易之須臾口開開即服藥立活惟須數易水石藥毒白鴨屎人參汁並解食莨菪悶亂如卒中風者飲甘草汁藍青汁即愈中鉤吻毒欲死者薺苨八兩㕮咀以水六升煮取三升冷如人體服五合日三夜二凡煮薺苨惟濃佳又方煮桂汁飲之又方啖蔥涕諸毒方同上中蠱茜根蘘荷根各三兩㕮咀以水四升煮取二升頓服又方槲樹北陰白皮一大握長五寸水三升煮取一升空腹服即吐蟲出中蠱下血方同上諸熱毒或蠱毒口鼻血出取人屎尖七枚燒作火色置水中研之頓服即愈亦解百毒時氣熱病之毒服已溫覆取汗勿輕此方極神驗諸服藥過劑悶亂者飲藍汁水和胡粉地漿蘘荷汁水和葛粉粳米沉乾薑黃連飴糖豉汁並解瘡中水毒炭白灰胡粉等分脂調塗瘡孔上水出則痛止瘡中水腫方同上卒刺手足中水毒搗韭及藍青置上以火灸熱徹即愈破傷風腫厚塗杏仁膏燃麻燭遙灸之蛇蠍毒等第六凡蛇毒消蠟注瘡上不瘥更消注之又以母豬耳中垢敷之牛耳垢亦可蝮蛇毒令婦人尿瘡上又方令婦人騎度三過又令坐上又方末姜薄之干則易又方以射罔塗腫上血出即愈又方生麻楮葉合搗以水絞去滓漬之衆蛇毒乾薑雄黃等分末和射罔著竹筒中有急用之又方雄黃末敷瘡上日一又方用銅青敷瘡上又方搗大蒜和胡粉敷之又方雞屎二七枚燒作灰投酒服之又方以面圍上令童男尿其中燒鐵令赤投中冷復燒著二三度瘥又方口嚼大豆葉塗之又方豬脂和鹿角灰塗之又方鹽四兩水一斗煮十沸沸定以湯浸冷易之又方搗紫莧取汁飲一升以滓封瘡以少水灌之又方梳中垢如指大長一寸尿和敷之又方炙梳汗出尉之又方取合口椒胡荽苗等分搗敷之無不瘥又方灸螫處三七壯無艾以火頭稱瘡孔大小熱之蛇齧人屎厚塗帛裹即消睡中蛇入口挽不出以刀破蛇尾內生椒三兩枚裹著須臾即出又方艾灸蛇尾即出又方以刀周匝割蛇尾截令皮斷仍將皮倒脫即出蛇入口並七孔者割母豬尾頭瀝血著口中即出又方以患人手中指等截三歲大豬尾以器盛血傍蛇瀉血口中拔出之卒為蛇繞不解以熱湯淋之又方令人尿之蛇蠍螫服小蒜汁滓敷上又方熟搗葵取汁服又方取齒中殘飯敷之又方豬脂封之又方射罔封之又方硇砂和水塗上立愈又方若著手足冷水漬水微暖則易之著余處冷水浸故布㩉之小暖則易又方生烏頭末唾和敷之射工毒不治七日能殺人鬼臼葉一把內苦酒中漬之熟搗絞汁服一升日三為妙又方取生吳萸莖葉一握斷去前後握中熟搗以水二升煮取七合頓服之立愈又方取葫切貼瘡灸七壯又方赤莧菜搗絞取汁一服一升日四五服又方白雞屎取白頭者三枚湯和塗中毒處已有瘡者取芥子熟搗苦酒和厚塗瘡上半日痛便止又方取狼牙葉冬取根搗之令熟薄所中處又飲汁四五合蚰蜒入耳炒胡麻搗之以葛袋盛傾耳枕之即出又方以牛酪灌之滿耳即出出當半消若入腹中空腹食好酪一二升即化為黃水而出不盡更服於真人自雲手用神效水毒凡山水有毒蟲人涉水中人似射工而無物其診法初得之惡寒微似頭痛目眶痛心中煩懊四肢振焮腰背百節皆強兩膝痛或翕翕而熱但欲睡旦醒暮劇手足逆冷至肘膝一三日腹中生蟲食人下部肛中有瘡不痛不癢令人不覺不急治過六七日下部出膿潰蟲上食人五臟熱盛毒煩下利不禁八九日良醫不能治矣不過二十日殺人欲知是中水與非者當作五六升湯以小蒜五升㕮咀投湯中消息勿令大熱去滓以浴之是水毒身體當發赤斑無異者非也治中水毒取梅若桃葉搗絞取汁三升許或干以少水絞取汁飲之小兒不能飲以汁敷乳頭與吃又方搗蒼耳汁服一升又以綿裹杖沾汁導下部日二過即瘥又方蓼一把搗以酒和絞取汁一升服之不過三服一作梨葉又方藍一把搗水解以塗浴面目身體令遍又方搗蛇莓根末水飲之並導下部生者用汁凡夏月行常多齎此藥屑入水以方寸匕投水上流無所畏又闢射工凡洗浴以少許投水盆中即無毒人忽中水毒手足指冷或至肘膝者浮萍曝乾末之酒服方寸匕八九月中刺手足犯惡露腫殺人生桑枝三枝內煻灰中推引之令極熱斫斷正以頭柱瘡口上熱盡即易之盡三枝則瘡自爛仍取薤白搗綿裹著熱灰中使極熱去綿取薤白薄瘡上以布帛急裹之若有腫者便作之用薤白第一佳竹木刺皮中不出羊糞燥者燒為灰和豬脂塗刺若不出再塗一云用干羊屎末又方服王不留行即出兼取根末貼之又方煮山瞿麥汁飲之日三瘥止又方用牛膝根莖生者並搗以薄之即出瘡雖合猶出又方嚼白梅塗之又方白茅根燒末以膏和塗之亦治瘡因風致腫又方燒鹿角末以水和塗之立出久者不過一夕又方頭垢敷之即出惡刺苦瓠開口內兒尿煮三兩沸浸病上又方濃煮大豆汁漬取瘥又方莨菪根水煮浸之冷復易喉痹金瘡第七喉痹桂心末如棗核大綿裹著舌下即破又方荊瀝稍稍咽之又方只將囟上近頭心髮直上方作力提之其喉痹剝然一聲遂破最奇墮落車馬及車輾木打已死者以死人安著以手袖掩其口鼻眼上一食頃活眼開與熱小便二升凡墮落傷損欲死取淨土五升蒸之令溜分半以故布數重裹之以尉病上勿令大熱恐破肉冷則易之取痛止則已凡有損傷以此法治之神效已死不能言者亦活三十年者亦瘥腕折骨損者以大麻根葉搗汁飲一升無生麻煮乾麻汁服腕折四肢骨碎及筋傷蹉跌生地黃不限多少熟搗用薄所損處又云爛搗熬之以裹傷處以竹編夾裹令遍縛令急勿令轉動一日可十易三日瘥若血聚在折處以刀子破去血四肢骨碎筋傷蹉跌豉三升水三升漬取汁服之頭破腦出中風口噤大豆一斗熬去腥勿使太熟搗末熟蒸之氣遍合甑下盆中以酒一斗淋之溫服一升覆取汗敷杏仁膏於瘡上凡被打損血悶搶心氣絶不能言可闢開口尿其中令下咽即醒卒中毒矢搗藍汁一升飲之並薄瘡上若無藍取青布漬絞汁飲之並淋瘡中又方內鹽臍中灸之又方煎地黃汁作丸服之百日矢當出又方煮蘆根汁飲三升又方多飲葛根汁並治一切金瘡又方末雄黃敷之當沸汁出愈又方末貝齒服一錢匕大良又方搗葛根汁飲之葛白屑熬黃敷瘡止血金瘡破腹腸突出欲令入取人屎干之以粉腸即入矣又被傷腸出不斷者作大麥粥取汁洗腸內之常研米粥飲之二十日稍稍作強糜百日後乃可瘥耳金瘡煩滿赤小豆一升以苦酒漬之熬令燥復漬滿三日令色黑服方寸匕日三箭鏃及諸刀刃在咽喉胸膈諸隱處不出者牡丹皮一分白鹽二分一方作白蘞二味治下篩以酒服方寸匕日三出又方取栝蔞汁塗箭瘡上即出又方酒服瞿麥方寸匕日三瘥卒為弓弩矢所中不出或肉中有聚血取婦人月經布燒作灰屑酒服之又方白蘞半夏等分治下篩酒服方寸匕日三淺瘡十日出深瘡二十日出金瘡血出不止煮桑根十沸服一升即止又方柳絮封之又方搗車前汁敷之血即絶連根用立效又方飲人尿三升愈又方以蜘蛛幕貼之金瘡腹中瘀血大麻子三升蔥白二七枚使數人各搗令熟用九升水煮取一升半頓服之若血出不盡腹中有膿血更合服當吐膿血耳金瘡內漏還自取瘡中血著杯中水和服又方七月七日麻勃一兩蒲黃六兩酒服一錢匕日五夜二又方牡丹皮為散水服三指撮立尿出血金瘡苦痛楊木白皮熬令燥末之服方寸匕日三又末敷瘡愈金瘡若刺瘡痛不可忍百治不瘥者蔥一把以水三升煮數沸漬洗瘡止痛良傷墜車馬及諸物隱體肉斷者以酢和麵塗之筋骨傷初破時以熱馬尿敷之無瘢又方大豆二升水五升煮取二升以醇酒六七升合和豆汁服之一日盡如湯沃雪用小豆亦佳落車墜馬及木崩血腹滿短氣大豆五升以水一斗煮取二升去豆一服令盡劇者不過三作金瘡便以石灰厚敷無石灰只灰亦可裹之止痛又速愈若深未宜速合者內少滑石令瘡不時合也針灸瘡血出不止燒人屎灰敷之金瘡血出多其人必渴當忍之啖燥食並肥脂之物以止渴慎勿鹹食若多飲粥及漿犯即血動溢出殺人又忌嗔怒大言笑思想陰陽行動作勞多食酸鹹飲酒熱羹臛輩瘡瘥後猶須如此出百日半年乃可復常也又方燒乾梅作炭搗末敷之一宿即瘥亦治被打傷又方磁石末敷之止痛斷血又方桑白汁塗桑白皮裹或石灰封之妙又方麻葉三升以水三升煮取二升半為一服又方飲麻子汁數升亦治毒箭所傷又方蚯蚓屎以水服方寸匕日三又方杏仁石灰細末豬脂和封亦主犬馬金瘡又方搗穀子敷之瘡疽癰腫第八發背亂髮灰酒服方寸匕亦治瘭疽又方飲鐵漿二升取利又方三年醋滓微火煎令稠和牛脂敷上日一易又方豬脂敷上日四五亦治髮乳又方豬羊脂切作片冷水浸貼上暖則易之五六十片瘥初貼少許即寒寒定好眠甚妙又方燒鹿角灰醋和敷之日四五瘭疽手足肩背纍纍如赤豆剝之汁出蕪青子熬搗帛裹展轉敷上良又方以麻子熬作末摩其上良又方酒和麵敷之又方剝去瘡痂溫醋泔清洗之以胡燕窠和百日男兒屎如膏敷之又方亂髮灰服方寸匕日三亦治發背又方煮蕓薹菜取汁一升服之並食干熟蕓薹數頓少與鹽漿冬月用其子水和服之又方以豬膽敷之良又方枸杞根葵根葉煮汁煎如糖服之隨意又方臘月糖晝夜浸之數日乃愈疽潰後鹽湯洗拭了燒皂角灰粉之良又方以牛耳中垢敷之良又方以生麻油滓綿裹帛瘡上蟲出又方以沸湯灌瘡中三四遍疽似癰而小有異今日去膿了明日還滿膿如小豆汁者蕓薹熟搗濕布袋盛之埋熱灰中更互尉之即快得安不過再三即瘥冬用乾者又方皂角煎湯洗拭乾以柏皮末敷勿令作痂一切腫毒痛不可忍者取萆麻子搗敷之即瘥惡毒腫一宿可殺人者茴香草搗取汁飲一升日三四服滓敷腫上冬中根亦可用起死神方魚臍疔瘡不大痛者殺人以寒食餳敷之良又硬者燒灰塗貼即瘥又方先以針刺瘡上四畔作孔搗白苣取汁滴瘡孔內疔腫忌見麻勃見即死者以針刺四邊及中心塗雄黃末立愈一云塗黃土又方鼠新坌土和小兒尿敷之又方鐵衣末和人乳汁敷之立可又方小豆花為末敷之瘥又方人屎尖敷之立瘥又方以四神丹一枚當頭上安經宿則根出矣四神丹方在第十二卷中因瘡腫痛者皆中水及中風寒所作其腫入腹則殺人溫桑灰汁漬之冷復溫之常令熱神祕治癰芫花為末膠和如粥敷之瘡發心胸以下者武都雄黃松脂各三兩和為塊刀子刮為散飲服方寸匕日三不瘥更合石癰堅如石不作膿者生商陸根搗敷之干則易之取軟為度又治濕漏諸癰癤又方蜀桑根白皮陰乾搗末炷膠以酒和藥敷腫即拔出根又方醋和莨菪子末敷頭上即拔出根又方蛇脫皮貼之經宿瘥又方梁上塵葵根莖灰等分醋和敷之即瘥又方櫟子一枚以醋於青石上磨之以塗腫上干更塗不過十度即愈又方當上灸之百壯石子當碎出如不出益壯乃佳癰腫痛煩悶生楸葉十重貼之以帛包令緩急得所日二易止痛兼消腫蝕膿甚良勝於衆物如冬月先收乾者用時鹽潤之亦可薄削楸皮用之癰始覺腫令消以莨菪末三指撮水和服之日三神良已結膿使聚栝蔞根末之苦酒和敷上燥則易赤小豆亦佳癰腫芥子末湯和敷紙上貼之又方白姜石末蒜和搗敷上瘥又方馬鞭草搗敷上即頭出又方灸兩足大拇趾奇中立瘥仍隨病左右癤無頭者吞葵子一枚不得多服又方燒葛蔓灰封上自消牛糞灰亦佳又方鼠黏根葉貼之又方水和雀糞敷之又方生椒末釜下土等分醋和塗之一法有曲末癰有膿令潰雞羽三七枚燒末服之即潰又方人乳和麵敷上比曉膿血出並盡不用近手又方箔經繩燒灰末臘月豬脂和敷下畔即潰不須針灸膿潰後瘡不合熟嚼大豆敷之又方炒烏麻令黑熟搗敷之又方牛糞敷之干則易又方燒破蒲席灰臘月豬脂和內孔中癰久不差馬齒葉搗汁煎敷之癰癤潰後膿不斷及諸物刺傷瘡不瘥者石硫黃粉一兩箸一片捶頭碎少濕內硫黃中以刺瘡孔瘡差為度癰肉中如眼諸藥不效犯疔瘡蕪菁根鐵生衣等分和搗以大針刺作孔復削蕪菁根如針大以前鐵生衣塗上刺孔中又塗所搗者封上仍以方寸匕緋帛塗貼之有膿出易之須臾拔根立瘥忌油膩生冷醋滑五辛陳臭黏食又方刺瘡頭及四畔令汁極出搗生栗黃敷上以面圍之勿令黃出從旦至午根即拔矣又方以面圍瘡如前法以針亂刺瘡銅器煮醋令沸瀉面圍中令容一盞冷則易之三度即拔根出又方取蛇脫皮如雞子大以水四升煮三四沸去滓頓服立瘥又方取蒼耳苗搗取汁一二升飲之滓敷上立瘥一方灸掌後橫文後五指男左女右七壯癰肉中如眼諸藥不效取附子削令如棋子安腫上以唾貼以火灸之令附子欲焦復唾濕復以火灸之如是三度令附子熱氣微內即瘥一切腫毒疼痛取萆麻子熟搗敷之即瘥腳腫向上至腹即殺人者赤小豆一斗以水三斗煮令爛出豆以汁浸腳至膝每日一度瘥止若已入腹不須浸但煮豆食之忌鹽菜米麵等渴飲汁瘥乃止瘡久不瘥瘥而復發骨從孔出名骨疽以豬脂和楸葉搗封之又方搗白楊葉敷之又方蕪菁子搗敷之帛裹一日一易又方穿地作坑口小里大深三尺取乾雞屎二升以艾及荊葉搗碎和雞屎令可燃火坑中燒之令煙出將疽就坑口熏之以衣擁口勿泄氣半日當有蟲出甚效附骨疽槲皮燒末飲服方寸匕又方灸間使後一寸隨年壯立瘥一切疔腫蒼耳根莖苗子但取一色燒為灰酢泔澱和如泥塗上干則易之不過十度即拔根出神良又方取鐵漿每飲一升立瘥又方面和臘月豬脂封上立瘥又方蒺藜子一升燒灰釅醋和封上經宿便瘥或針破頭封上更佳又方皂角子取仁作末敷之五日內瘥又方艾蒿一擔燒作灰於竹筒中淋取汁以一二合和石灰如麵漿以針刺瘡中至痛即點之點三遍其根自拔赤眼疔熬白粉令黑蜜和敷之良又方以新坌鼠壤水和塗之熱則易之又方搗馬牙齒末臘月豬脂和敷之可拔根出亦燒灰用火燒瘡慎不得以冷水洗熱得冷更深入骨壞人筋骨難瘥初被火燒急更向火灸雖大痛強忍之一食久即不痛神驗又方家中一女子火燒手且浸浸至掌急以酸酢升余浸之出酢尚痛時不痛止不瘡不膿不瘢神妙神妙又方末熬油麻和梔子仁塗之惟厚為佳又方已成瘡者燒白糖灰粉之即燥立瘥因瘡而腫痛劇者數日死或中風寒或中水或中狐尿刺燒黍穰若牛馬屎若生桑條燒取多煙以熏之汗出愈如無生桑條取得多煙之物燒熏汗出愈又方熱蠟內瘡中新瘡亦善又方以鳧公英草根莖白汁塗之惟多塗為佳大神效此草蜀中名耳瘢菜關中名苟乳乳奴狗切腸癰雄雞頂上毛並屎燒作末空心酒服又方截取檐頭尖少許燒作灰水和服當作孔出膿血愈又方瓜子三升末之以水三升煮取一升五合分三服又方死上冢上土作泥塗之內癰未作頭者服雞屎即瘥又方腸癰屈兩肘正灸肘頭鋭骨各百壯則下膿血即瘥婦人妒乳取葵莖灰末之飲服方寸匕日三即愈一法為末不為灰又一方取研米槌二枚炙令熱以絮及故帛拓乳上以捶更互尉之瘥止乳癰以水罐盛酢泔清燒石令熱內中沸止更燒如前少熱內乳漬之冷更燒石內漬不過三燒石即愈又一方取蔥白搗敷之並絞汁一升頓服即愈又方柳根削取上皮搗令熟熬令溫盛練袋中尉乳上干則易之一宿即愈又方鹿角治下篩以豬脂上清汁服方寸匕不過再服亦可以醋漿水服
