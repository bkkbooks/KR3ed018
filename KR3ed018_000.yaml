front:
  text: 自序孫真人千金方一部三十卷三百一十八門門中各有論論下各有方論以論說人所以得病之由君子小人皆宜熟知方以治人之已病而人有未嘗得見此集者並藥有物多而難合者貧下細民因此不獲治療枉壞軀命者可勝言哉況一州一縣幾家能有千金方而有者亦難於日日示人因此孫君之仁術仁心格而不行處有之鬱而不廣處有之孫君之書上本黃帝岐伯次祖扁鵲華佗張仲景陳延之衛汛王叔和小品肘後龍宮海上而下及當時之名公方論藥術並自撰經試者世皆知此書為醫經之寶余亦概嘗閱諸家方書內唯千金一集號為完書有源有證有說有方有古有今有取有舍關百聖而不慚貫萬精而不忒以儒書擬之其醫師之集大成者歟唐之盧照鄰謂思邈高談正一則古之蒙莊深入不二則今之摩詰斯言得其深致矣思久欲闡揚此書以廣之海內而在公牽迫終不克遂今休閒矣遂取千金方中諸論逐件條而出之以告人使人知防之於未然之前又將千金方中諸單方逐件列而出之以示人使人知治之於已病之後其思家與知識家經用神驗者亦附之其中各別稱說買巨石刊之以廣其傳以救急者為先以稍可待者為次以尋常大病為三以尋常次病為四孫君之書以婦人小兒為首以男子婦人雜病為後思今皆依之而特取諸病目前交急者為首此思急於救人推行孫君之妙法本意也謹敢以千金寶要命篇誓施萬本長者仁人當共斯善宣和六年四月初一日徽猷閣直學士通奉大夫致仕河陽郭思謹序刻千金寶要序千金寶要者宋徽猷閣直學士郭思按唐孫真人先生所集千金方中纂要者也宣和六年思曾刻石於華州公署我明正統八年華州知州劉整重刻景泰六年知州楊勝賢以石刻冬月不便摹印易刊木版往年春余得之喜其方之簡便藥之近易醫不煩而取效速信有切於人之實用乃珍如拱璧不容自秘已命壽之梓矣竊惟寶要纂自真人千金方中天下之遊耀州真人洞者歲無虛日日無虛時顧獨不立石於真人洞前非所以廣其傳也因刻於洞前云隆慶六年歲在壬申春三月上吉秦王守中識郡人左重耀敬觀重刻千金寶要序千金寶要十七卷附論及千金須知為十八卷宋宣和時郭學士思從孫徵君思邈所撰千金方擇要刻石華州公署自明正統景泰間俱有木石刻本至隆慶六年秦王守中復刊石耀州真人祠四庫全書未及收錄余遊關中得其拓本藏笈中按家徵君生於後周卒於唐永淳之代葉夢得避暑錄話稱其作千金前方時已百餘歲後三十年作千金翼段成式酉陽雜俎則謂昆明池龍宮有仙方三千首徵君以救龍得之因上帝不許妄傳復著千金方三十卷每捲入一方千金方本與千金翼方為二書是以舊唐書本傳止載千金方三十卷晁公武陳振孫書目則云各三十卷今俗本千金翼方九十三卷不知何人更其次第千金前方竟不可別此宣和時擇要本當從前方錄出者龍宮仙方在其內真世間秘異之書不可不廣其傳以公同志書中謂今俗稱痘瘡為小兒丹毒又有反花瘡元人奇效良方始謂之痘疹可證俗人謂此疾出於近代者非也縊死人可救落水人經一宿猶可活倉卒間不知其方書備其術尤為濟人之仁術世之從政者不師蓋公獄市勿擾之言惟株累鍛鍊之是務置一切積貯水利農田學校利益於人之事於不問以致損傷元氣感召災殃誠不如尋覽方書胸中常有活人之念為善最樂在此不在彼矣嘉慶十二年七月三日賜進士及第授通奉大夫署山東布政使督糧道加四級陽湖孫星衍撰於藩署之濟性堂
