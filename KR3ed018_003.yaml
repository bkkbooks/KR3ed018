body:
  text: 卷之三霍亂吐瀉第九霍亂轉筋蓼一把去兩頭以水二升煮取一升頓服之一方作梨葉又方燒故木梳灰末之酒服一枚小者永瘥又方車彀中脂塗足下瘥又方作極鹹鹽湯於槽中暖漬之又方以醋煮青布拓之冷復易之轉筋不止若男子以手挽其陰牽之女子挽其乳近左右邊轉筋在兩臂及胸中者灸手掌白肉際七壯又灸膻中中府巨關胃管尺澤並治筋拘頭足皆愈霍亂引飲飲輒乾嘔生薑五兩㕮咀以水五升煮取二升半分二服高良薑大佳中熱霍亂暴利心煩脈數欲得冷水者新汲井水頓服一升立愈先患胃口冷者勿服之霍亂吐下腹痛以桃葉煎汁服一升立止冬用皮走哺轉筋灸踵踝白肉際各三七壯又灸小腹下橫骨中央隨年壯轉筋四厥灸兩乳根黑白際各一壯轉筋灸湧泉六七壯在足心下當拇趾大筋上又灸足大趾下約中一壯又方轉筋不止灸足踵聚筋上白肉際七壯立愈轉筋入腹痛欲死四人持手足灸臍上一寸十四壯自不動勿復持之又灸股里大筋去陰一寸霍亂轉筋令病人合面正臥伸兩手著身以繩橫量兩肘尖頭依繩下夾脊骨兩邊相去各一寸半灸一百壯無不瘥霍亂已死有暖氣者灸承筋取繩量圍足從趾至跟匝捻取等折一半以度令頭至跟踏地處別綖上至度頭即是穴灸七壯起死人又以鹽內臍中灸二七壯霍亂洞下不止艾一把水三升煮取一升頓服之良又方香茅一把水四升煮取一升頓服之青木香亦佳蠱毒宿食不消霍亂極鹹鹽湯三升熱飲一升刺口令吐宿食使盡不吐更服吐訖復飲三吐乃住此法大勝諸治俗人以為田舍淺近法鄙而不用守死而已凡在此病即須先用之又方扁豆一升香薷一升以水六升煮取二升分服單用亦得胞轉小便不通亂髮急纏如兩拳大燒末醋四合和二方寸匕服之訖即炒熟黑豆葉蹲坐其上又方阿膠三兩水三升煮取七合頓服之又方豉五合以水三升煮數沸頓服之又方麻子煮取汁頓服之又方連枷關燒灰水服之又方筆頭燒灰水服之又方灸玉泉七壯穴在關元下一寸大人從心下處取八寸是玉泉穴小兒斟酌取之又法灸第十五椎五十壯又法灸臍下一寸隨年壯一日四寸吐逆霍亂吐血灸手心主五十壯吐血生地黃肥者五升搗以酒一升煮沸三上三下去滓頓服之又方服桂心末方寸匕日夜可二十服亦治下血忽吐血熟艾三雞子許水五升煮取二升頓服又方燒亂髮灰水服方寸匕日三亦治舌上忽出血如簪孔者亦治小便出血中蠱下血日數十行苦瓠一枚以水二升煮取一升稍稍服之當下蠱及吐蛤蟆蝌蚪之狀一月後乃盡又云苦瓠毒當臨時量用之又云用苦酒一升煮虎犬馬傷第十針折入肉附虎咬瘡煮葛根令濃以洗之十遍飲汁及搗為散以葛根汁服方寸匕日五甚者夜二又方青布急卷為繩止一物燒一頭燃內竹筒中注瘡口熏之妙又方煮鐵令濃洗瘡又方嚼栗子塗之良剝死馬骨傷人毒攻欲死便取馬腸中屎塗之大良又方取其屎燒灰服方寸匕狂犬咬人毒有七日一發百日內殺人者每到七日搗韭汁飲一二升當終身禁食犬肉蠶蛹若犯則死不可救瘡未愈之間禁食生魚及諸肥膩冷食但於飯下蒸魚及於肥器中食便發不宜飲酒過一年乃佳猘犬齧人搗地榆絞汁塗瘡無生者取乾者以水煮汁飲之亦可末之服方寸匕日三兼敷之過百日止又方搗韭絞汁飲一升日三瘡愈止又方以豆醬清塗之日三四又方刮虎牙或骨服方寸匕猘犬毒燒虎骨敷瘡及尉又微熬杏仁搗研取汁服之良又取燈盞殘油灌瘡口此皆禁生菜豬肉魚酒又方用韭根故梳二枚以水二升煮取一升頓服又方桃東南枝白皮一握水二升煮取一升分二服吐出犬子又方服莨菪子七枚日一又方梅子末酒服猘犬所齧惡血未盡灸上一百壯以後當日灸一壯若不血出刺出其血百日灸乃止禁飲酒豬犬肉凡犬齧人以熱牛屎塗之佳針折入肉中刮象牙末水和聚著折針上即出又方磁石吸鐵者著上即出舌耳心目等大小便第十一舌卒腫滿口溢出須臾不治殺人急以指刮破舌兩邊去汁即愈又方取釜下墨以酢厚敷舌上下脫去更敷佳又方半夏十二枚洗熟以酢一升煮取八合稍稍含嗽之吐出加生薑一兩佳又方滿口含糖酢少許時熱通即止舌上出血如泉燒鐵篦熟烙孔中良舌強不語礬石桂心等分為末安舌下立瘥耳中有物不可出以弓弦從一頭令散敷好膠注耳中物上停之令相著徐徐引之耳聾干耵聹不可出三年酢灌之最良綿塞之半日許必有物出百蟲入耳末蜀椒一撮以酢半升調灌耳中行二十步即出又方桃葉火尉卷之塞耳立出又方車釭脂敷耳孔蟲自出肘後以療聤耳膿血又方以蔥涕灌耳中蟲即出亦治耳聾齒齦間血出不止生竹茹二兩醋煮含之又方溫童子小便半升取三合含之其血即止九孔出血搗荊葉取汁酒服二合一即荊芥九種心痛取當太歲上新生槐枝一握去兩頭㕮咀以水三升煮取一升頓服又方桃白皮煮汁空腹以意服之婦人心痛布裹鹽如彈丸燒作灰酒服又方燒稱錘投酒中服佳又方炒大豆投酒中服佳産後卒心痛桂心三兩酒三升煮取二升去滓分三服日三又腹中苦痛生牛膝五兩酒五升煮取二升去滓分二服若干牛膝根即酒浸一宿方可煮奔豚氣急作湯以浸兩手足數數易之又方灸章門百壯一名長平二穴在大橫外直臍肋端又方灸氣海百壯穴在臍下一寸半又方灸關元百壯在臍下三寸又方灸中極五十壯在臍下四寸又方灸期門百壯直乳下第二肋端傍一寸五分又方灸四滿二七壯穴夾丹田兩傍相去三寸即心下八寸臍下橫紋是也奔豚腹中與腰痛灸中府百壯穴在兩乳上三肋間耳聾有膿不差有蟲先以綿纏去耳中汁以礬石末粉耳中次以石鹽末粉其上食久乃起不過再度永瘥聤耳桃仁熟搗以故緋絹裹內耳中日三易以瘥為度治底耳黃礬燒綿裹內耳中不過三日愈或以葦管吹耳中治蟲心痛鶴蝨末之蜜和梧子大服四十丸日三蜜湯下加至五十丸慎酒肉又方鶴蝨一兩末之空腹溫酢一盞和服之蟲當吐出又方服漆一合熱翳漫睛以羊筋漱口熟嚼夜臥開目納之即閉目睡去膜明日差亦治眯目眼暗以銅器盛大酢三四升煎七八日覆器濕地取銅青一合以三月杏白仁一升取汁和銅青敷之日不過三四度大良又方含黃柏一爪甲許使津置掌中拭目訖以水洗之至百日眼明此法乃可終身行之永除眼疾神良雀目術令雀目人至黃昏時看雀宿處打令驚起雀飛乃咒曰紫公紫公我還汝盲汝還我明如此日日暝三過作之眼即明曾試有驗大小便不通葵子末一升青竹葉一把以水二升煮五沸頓服又方葵子一升榆皮一升水五升煮取二升分三服又方葵子一升以水三升煮取一升去滓納豬脂一升空腹分二服又方甑帶煮取汁和蒲黃方寸匕日三服又方豬脂一升以水二升煮三沸飲汁立通又方灸臍下一寸三壯失缺頰車蹉一人以手指牽其頤以漸推之則復入矣推當疾出指恐誤齒傷人指也又方消蠟和水敷之目眯不出以蠶沙一粒吞之即出卒食物入鼻有入腦羊脂如指大內鼻中吸上脂消則物隨脂下鼻中出血不止搗楮葉汁飲三升大良齒痛蚯蚓糞水和作稠泥團以火燒之令極赤如粉以臘月豬脂和敷齦上日三兩度永瘥又方馬齒菜一把嚼之即瘥齒根動欲落生地黃綿裹著齒上咋之及㕮咀以汁漬齒根日四五並咽汁十日大佳大便難好膠三寸蔥白一把以水四升煮取一升半頓服之即下又方葵子汁和乳汁等分服之立出大便失禁不拘老人小兒灸兩腳大趾去甲一寸三壯又灸大趾奇間三壯小便不通水四升洗甑帶取汁煮葵子取二升半分三服又方胡燕糞豉各一合和搗丸如梧桐子大服三丸日三又方發去垢燒末一升葵子一升以飲服方寸匕日三又方石槽塞灰土井花水服之日三又方服車前子末方寸匕日三百日止卒不得小便車前草一把桑白皮半兩㕮咀以水三升煎取一升頓服之婦人卒不得小便者杏仁二七枚熬末服之立通又方紫菀末井花水服三指撮立通血出四五度服之大小便不利葵子二升硝石二兩以水五升煮取二升分再服小便不利大便數注灸屈骨端五十壯胃反食則吐搗粟米作面水和作丸如楮子大七枚爛煮內酢中細細吞之得下便已面亦得用之胃反食即吐出上氣蘆根茅根各二兩細切以水四升煮取二升頓服之得下良又方飲白馬尿即止又方淘小芥子曝乾為末酒服方寸匕日三又方灸兩乳下各一寸以瘥為度上氣上酥一升獨頭蒜五顆先以酥煎蒜黃出之生薑汁一合共煎令熟空腹溫服方寸匕上氣嘔吐芥子二升末之蜜丸寅時以井花水服如梧子大七丸日二亦可作散酒浸服治臍下絞痛腳氣入腹困悶欲死吳茱萸六升木瓜兩個切以水一斗三升煮取三升分三服如人行十里久再進一服或吐或汗或利或大熱悶即瘥此起死人方卒噎滿口著蜜食之即下又方刮舂杵頭細糠含之即下又方老牛涎棗核大水中飲之終身不復噎齲齒及蟲痛切白馬懸蹄如米許以綿裹著痛處孔中不過三度又方家中法以煮酒蠟少許任在蟲孔子中以熱火箸烙之令蠟融於孔立愈熱病後眼暗失明以羊膽敷之旦暮各一明目令發不落牛膽中漬槐子陰乾百日食後吞一枚十日身輕三十日白髮再黑百日通神明目小黑豆每日空心吞二七枚又方三月三日採蔓菁花陰乾治下篩空心井花水服方寸匕久服可夜讀細書目赤及翳烏賊骨鉛丹大小等分合研細和白蜜如泥蒸之半食久冷著眼四眥日一治三十年聾故鐵三十斤以水七斗浸三宿取汁入曲釀米七斗如常造酒法候熟取磁石一斤研末浸酒中三日乃可飲取醉以綿裹磁石內耳中好覆頭臥酒醒去磁石即瘥耳聾鳴汁出一二十年不瘥礬石少許以生菖蒲根汁和點入耳中耳聾巴豆十四個成煉松脂半兩合治丸如黍米大綿裹以簪頭著耳中一日一易藥如硬微火灸之以汁出乃愈妙又方菖蒲附子等分末之以麻油和以綿裹內耳中又方芥子搗碎以男兒乳和綿裹內之又方作一坑可容二升許著炭火其中坑似窖形以磚覆口上磚上作一孔可容一小指磚孔上著地黃一升以木盆覆之以泥泥盆下勿泄盆底上鑽一小孔可容箸其孔上著三重布以耳孔當盆上熏久若悶去黃水發裹鹽塞之不過二三度神效又方酒三升浸牡荊子二升碎之浸七日去滓任性服盡三十年聾亦瘥又方硫黃雄黃各等分末之綿裹內耳中數日聞人語中風大風水氣第十二大風半身不遂蠶砂兩石熟蒸作直袋三枚各受七斗熱盛一袋著患處如冷即取余袋一依前法數數易百不禁瘥止須羊肚釀粳米蔥白薑椒豉等爛煮熱吃日食一枚十日止千金不傳百種風灸腦後項大椎平處兩廂量二寸三分各灸百壯得瘥須取病人指寸量卒病惡風欲死灸第五椎名曰藏輸一百五十壯三百壯便愈中風口僻眼急諸藥不能瘥者枳實上青刮取末欲至心止得茹五升微火炒去濕氣以酒一斗漬微火暖令得藥味隨性飲之大驗治緩風急風並佳中風口喎炒大豆三升令焦以酒三升淋取汁頓服之口噤不開亦治又方大皂角一兩去皮子下篩以三年大酢和左喎塗右右喎塗左干更塗之卒氣短搗韭汁服一升立瘥大風疾煉松脂投水中二十遍蜜丸服二兩飢便服之日三鼻柱斷離者二百日服之差斷鹽及雜食房室又方天門冬酒服百日愈大風灸百會七百壯腎寒灸腎腧百壯中風口喎灸手交脈三壯左灸右右灸左其炷如鼠屎橫安之兩頭下火風勞毒腫疼痛攣急桃仁一升研如常法以酒三升攪和頓服之厚衣蓋令汗不過三劑猥退風萆麻脂一升酒一斗銅鉢盛著酒中一日煮之令熟服之失音濃煮桂汁服一升覆取汗亦可末桂著舌下漸漸咽汁又方濃煮大豆汁含亦佳無豆用豉歷節風松膏一升酒三升浸七日服一合日再數劑愈冷氣氣短蜀椒五兩絹袋盛以酒一斗浸之二七日服之任意多少卒上氣鳴急便欲死者搗韭汁服一升良乏氣枸杞葉生薑各二兩㕮咀以水三升煮取一升頓服心腹冷痛熬鹽一斗尉熬蠶砂燒磚石蒸尉取其里溫暖止蒸土亦大佳虛勞浮腫灸太衝百壯又灸腎腧虛勞不得眠酸棗榆葉等分末之蜜丸如梧子大每服十五丸日再又方乾薑四兩末湯和頓服覆取汗愈一切虛羸鹿骨一具碎枸杞根切二斤二味各以水一斗別器各煎汁五升去滓澄清仍合一器共煎取五升日二服盡好將慎皆用大斗補虛羸九月十日取生濕枸杞子一斗酒六升煮五沸出取研之熟濾取汁令其子極淨暴子令乾搗末和前汁微火煎令可丸酒服二方寸匕日二加至三方寸匕亦可丸服五十丸腹脹滿繞臍結痛堅不能食灸中守百壯穴在臍上一寸一名水分脹滿氣聚寒冷灸胃管百壯三報穴在鳩尾下三寸脹滿瘕聚滯下冷疼灸氣海百壯穴在臍下一寸忌不可針脹滿氣如水腫狀小腹堅如石灸膀胱募百壯穴在中極臍下四寸脹滿腎冷瘕聚泄利灸天樞百壯穴在臍傍相對橫去臍兩傍各二寸諸冷極馬藺子九升淨治去土空腹服一合日三飲及酒下之服訖須臾以食壓之取瘥乃止骨蒸天靈蓋如梳大炙令黃碎以水五升煮取二升分三服起死人神方又方取人屎灰以酒服方寸匕日三走疰燒車釭令熱暫入水以濕布裹尉之三十年氣疰豉心半升生椒一合以水二升煮取半升適寒溫用竹筒縮取汁令病者側臥以手擘大孔射灌之少時當出惡物此法垂死悉治得瘥百千不可具述咳嗽胸脅支滿多唾上氣酒一升半浸肥皂莢兩挺經宿煮取半升分三服七日忌如藥法若吐多以酢飯三四口止之又方薑汁一升半沙糖五合煎薑汁減半內糖更煎服之又方白糖五合微煅令消內皂莢末方寸匕合和相得先食服如小豆二丸又方服芥子七丸以油酒下之上氣咳嗽乾薑末三兩膠飴一斤二味和令調蒸五升米下冷以棗大含稍稍咽之日五夜二三十年嗽百部根二十一斤搗取汁煎如飴服方寸匕日三又方白蜜一斤生薑二斤取汁二味先將銅銚稱知斤兩訖內蜜復稱知數次內薑汁以微火煎令薑汁盡惟有蜜斤兩在丸如棗大含一丸日三禁一切雜食又方紫菀二兩款冬花二兩末之食後以飲服方寸匕日三七日瘥久水腹大如鼓烏豆一斗熬令香勿令大熟去皮為細末餳粥皆得服之初服一合稍加之若初服多後即嫌臭服盡即更造取瘥止不得食肥膩渴則飲羹汁慎酒肉豬雞魚生冷酢滑房室得食漿粥牛羊兔鹿肉此據大飢渴時食之可忍亦勿食也此病難治雖諸大藥丸散湯膏當時雖瘥過後復發惟此散瘥後不發終身服之終身不發矣其所禁食物常須少啖莫隨意咸物諸雜食等又方葶藶末二寸匕蒼耳子灰二寸匕調和水服之日二又方椒目沉水者取熬之搗如膏酒服方寸匕又方水煮馬兜鈴服之水腫利小便葶藶四兩生用桂心一兩末之蜜丸飲下梧子大七丸日二以知為度又方牽牛子末之水服方寸匕日一利止又方郁李仁末面各一升和作餅子七枚燒熟空腹熱食四枚不知更加一枚加至七枚大水頭面遍身腫脹苦瓠白穰實捻如大豆以麵裹煮一沸空腹吞七枚至午當出水一升三四日水自出不止大瘦乃瘥三年內慎口味也苦瓠須好無厭翳細理研淨者不爾有毒不堪用崔氏用子作餛飩服二七枚若恐虛者牛乳服之如此隔日作服漸加至三七枚以小便利為度小便若太多即一二日停止水通身腫煎豬椒枝葉如餳空腹服一匕日三癢以汁洗之又方苦瓠膜二分葶藶子五分熬搗為丸如小豆大服五丸日三又方單服牛尿大良凡病水無不瘥服法先從少起得下為度又方大棗肉七枚苦瓠膜如棗核大搗丸一服三丸如行十五里久又服三丸水出更服一丸即止又方煎人尿令可丸如小豆大日三服又方葶藶桃仁各等分皆熬合搗為丸服之利小便一日用杏仁又方搗生葶藶子酢和服以小便數為度又方燒姜石令赤內黑牛尿中令熱服一升日一又方灸足第二趾上一寸隨年壯又灸兩手大指縫頭七壯凡腫病須百日內外攻之生商陸一斤豬脂一斤煎可得二升右二味和煎令黃去滓以磨腫處亦可服少許並塗以紙覆之燥輒敷之不過三日瘥凡卒中風口喎以葦筒長五寸以一頭刺耳孔中四畔以面密塞之勿令泄氣一頭內大豆一顆並艾燒之令燃灸七壯即瘥患右灸左患左灸右耳病亦灸之若不能語者灸第三指上百壯若眼反口噤腹中切痛灸陰囊下第一橫理十四壯人卒死者灸法同之破傷風腫厚塗杏仁膏燒麻燭遙灸之刺傷中風水刮箭羽下漆塗之又方服黑牛熱尿一服二升三服即止又方煮韭熟拓之又方蠟一兩熱灸尉薄裹其上水出愈
