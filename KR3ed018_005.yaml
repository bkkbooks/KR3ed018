body:
  text: 卷之五疫瘴渴淋第十五令瘟不相染人汲水瓶上繩長七寸盜著病人臥席下良又方以繩度所住戶中壁屈繩則斷之又方桃木蠹屎末之水服方寸匕又方朮豉等分酒漬服之妙又方正旦吞麻子赤小豆各三七枚又以二七枚投井中又方新布袋盛大豆一升內井中一宿出服七枚又方松葉末之酒服方寸匕日三又方常以七月七日閤家向日吞赤小豆二七枚又方常以七月七日男吞大豆七枚女吞小豆二七枚又方正旦取東行桑根大如指長七寸以丹塗之持門戶上又令帶之又方常以月望日細銼東引竹枝煮湯浴瘴氣蒜五子並皮碎之豉一升以三歲男兒尿二升煮五六沸去渣服之良又方青竹茹二升以水四升煮取三升分三服汗不止者白朮葉作飲方寸飲之盜汗韭根四十九枚水二升煮一升頓服又方豉一升以酒二升漬三日若服不瘥更合服不過三劑消渴甘草乾薑各二兩㕮咀水三升煮取升半去滓分二服又法有大棗十二個渴利生栝蔞根三十斤切以水一石煮取一斗半去滓以牛脂五合煎水盡以溫酒食如雞子大日三服渴小便利復非淋榆白皮二斤切以水一斗煮取五升一服三合日三又方小豆藿一把搗取汁頓服三升又方薔薇根水煎服之佳又方三年重鵲巢燒末以飲服之又方桃膠如彈丸含之咽津又方蠟如雞子大以酢一升煮二沸適寒溫頓服之熱渴頭痛壯熱及婦人血氣上衝悶不堪者茅根切三升搗取汁渴即飲之令盡消渴病百日以上者不得灸刺消渴干浮萍栝蔞根等分末之以人乳汁和丸如梧子空腹飲服二十丸日三三年病者三日愈治虛熱大佳治渴黃連一斤生地黃一斤又云十斤絞地黃取汁浸黃連出燥爆之燥復內之令汁盡干之搗末蜜丸如梧子每服二十丸日三食前後無在亦可為散以酒服方寸匕大渴深掘大栝蔞根厚削皮至白處以寸切水浸一日夜易水經五日取出爛搗研之以絹袋濾之如出粉法干之水服方寸匕日三四亦可粥乳酪中食之不限多少取瘥止又云水和栝蔞散服方寸匕亦可蜜丸如梧子大每服三十丸又方取七家井索近桶口結燒作灰井花水服之不過三服瘥又方取豉漬汁任性多少飲之又方濃煮竹根取汁飲之以瘥止又方以青粱米煮取汁飲之以瘥止消中日夜尿七八升者鹿角炙令焦以酒服五分匕日三漸加至方寸匕又方漚麻汁服一升佳又方葵根如五升盆大兩束又云五六斤以水五斗煮取三斗宿不食平旦每服三升諸淋細白砂三升熬令極熱以酒三升淋取汁服一合淋痛蒲黃滑石等分末之酒服方寸匕日三氣淋船底胎如鴨子大水三升煮取二升頓服又方水三升煮豉一升一沸去滓內鹽一合頓服亦可單煮豉汁服又方水一斗煮比輪錢三百文取三升溫服之又方搗葵子末湯服方寸匕又方空心單茹蜀葵一滿口止又方熬鹽熱熨小腹冷復易亦治小便血又方臍中著鹽灸三壯石淋車前子二升絹袋盛水九升煮取三升頓服之石即出先經宿不得食又方取浮石使滿一手治下篩以水三升酢一升煮取二升澄清服一升不過三服石出亦治嗽醇酒煮之又方桃膠棗許大夏以三合冷水冬以三合湯和一服日三當下石子如豆卵石盡止亦治小便出血又方灸水泉三十壯足大敦是也膏淋搗葎草汁二升酢二合空心頓服之當尿小豆汁也又濃煮汁飲亦治淋瀝熱淋葵根一升冬用子夏用苗切大棗二七個以水三升煮取一升二合分二服熱加黃芩一兩出難加滑石末二兩血者加茜根三兩痛者加芍藥二兩加藥水亦加之又方白茅根切四斤以水一斗五升煮取五升服一升日三夜二又方常煮冬葵根飲之血淋生大麻根十個以水五升煮取二升頓服之亦治小便出血又方大豆葉一把水四升煮二升頓服之又方葵子一升水三升煮取汁日三服亦治虛勞尿血又方灸丹田隨年壯又灸伏留五十壯又云隨年壯五淋灸懸泉十四壯穴在內踝前一寸斜行脈上是中封之別名又方灸大敦三十壯卒淋灸外踝尖七壯小便血胡麻三升搗細末以東流水二升漬一宿平旦絞去滓煮兩沸頓服之小便出血龍骨細末之溫水服方寸匕日五六服一云酒服又方搗荊葉取汁酒服二合又方酒三升煮蜀當歸四兩取一升頓服又方煮車前根葉子多飲之佳又方刮滑石末水和敷繞小腹仍繞陰際佳又治小便不通又方酒服亂髮灰一雲水服又方酒服葵莖灰方寸匕日三頭面手足瘰癧瘡漏第十六凡口吻瘡以經年葵根欲爛者燒作灰熱敷之佳燕吻瘡白楊枯枝鐵上燒取𣿉及熱敷之佳唇上瘡經年不瘥八月藍取汁洗三日瘥諸瘡因風致腫燒白芋灰溫湯調之敷上厚三分干即易不過五度瘥又方櫟根皮三十斤銼水三斛煮令熱下鹽一把令的的然熱以浸瘡當出膿血日日為之瘥止反花瘡並積年諸瘡取牛蒡根一云牛蒡根熟搗和臘月豬脂封上瘥止又方馬齒菜搗封瘥止惡露瘡搗薤菜敷瘡口以大艾炷灸藥上令熱氣入內即瘥惡瘡燒扁竹灰和楮白汁塗之又方羊屎麻根燒煙斷膏和封有汁干敷惡瘡似火爛白馬屎曝乾以河水調煮十沸絞取汁洗之身瘡頭瘡菖蒲末敷上日三夜二惡瘡十年不差似癩蛇蛻皮一枚燒末之豬脂調敷醋調亦得又方苦瓠一枚㕮咀煮取汁洗瘡口日三又煎以塗癬甚良皆先以泔洗三日瘥又方鹽湯洗搗地黃葉貼之又方燒猳豬屎敷之又方燒莨菪子末敷之諸瘡久不瘥並六畜瘡棗膏三升水三斗煮取一斗半數洗取愈代指甘草二兩㕮咀水五升煮取一升半漬之若無用芒硝代之又方以唾調白硇砂搜面作碗子盛唾著硇砂如棗大以爪指著中一日瘥又方以毛雜黃土作泥泥指上令厚五分內煻灰中煨令熱可忍泥干易數度瘥又方刺指熱飯中二七遍愈又方以麻沸湯漬之即愈又方單煮地榆湯漬之半日瘥又方先刮去膿血炙魚鮓皮令溫以纏裹周匝痛止便愈又方蜀椒四合水一升煮三沸以漬之又方取萎黃蔥葉煮湯漬之指痛欲脫豬脂和鹽煮令消熱內其中食久住千金翼作和乾薑手足指掣痛醬清和蜜溫塗之又方灸指端七壯手足指逆臚此緣廁上搔頭還坐廁上以指倒捋二七下即瘥凍指馬屎三升以水煮令沸漬半日愈人腳冬夏常拆裂雞屎一升水二升煮數沸停小冷漬半日瘥亦用馬糞又方羊膠膠干故帛貼上九漏成煉松脂末之填瘡孔令滿日三四度七日瘥又方馬齒莧陰乾臘月燭燼等分末之以臘月豬脂調先以暖泔清洗瘡拭乾敷之日三又方干牛屎幹人屎搗先幕綿於瘡上綿上著屎蟲聞屎香出若癢即舉綿去之更取綿著屎如前蟲出盡乃止又方苦瓠四枚大如盞者各穿一孔如指大置湯中煮十數沸取一竹筒長一尺內一頭瓠孔中一頭注瘡孔上冷則易之遍止又方煮鹽花以面擁病上內鹽花面匡中厚二寸其下以桑葉三重藉鹽候冷熱得所可忍冷則無益熱則肉破一日一度候病根勢消則止若已瘡者搗穄谷末粉之又方槲北陰白皮三十斤銼之以水一石煮取一斗去滓煎如糖又取都廁上雌雄鼠糞各十四枚燒令汁盡末內煎中溫酒一升投煎中合攪之羸人五合服之當有蟲出漏作瘡孔末露蜂房臘月豬脂調敷孔上瘡因風致腫櫟木根皮一斤濃煮入鹽一把漬之灸瘡不瘥者每日於上別灸六七壯自瘥灸瘡中風冷腫痛但向火灸之瘡得熱則瘡快至痛止日六七灸愈諸漏霜下瓠花曝乾末敷之又方搗土瓜根薄之燥則易不限時節又方故布裹鹽如彈丸燒令赤末酒服又方服白馬屎汁一升又方正月雄狐屎陰乾末之水調敷又方鹽面和燒灰敷之又方水研杏仁服之又方豬脂一升酒五合煎沸頓服之漏下槐子燒末酒服方寸匕日三立瘥一切冷瘻燒人吐出蛔蟲為末先以甘草湯洗瘡後著灰無不瘥者慎口味鼠漏瘡差復發以不經水豬脂㕮咀生地黃內脂中令足相淹和煎六七沸桑灰汁洗瘡去惡汁以此膏敷日一易鼠漏腫核未成膿以柏葉著腫上熬鹽著葉上熨之令熱氣下即消螻蛄瘻槲葉灰先以泔清煮槲葉取汁洗拭乾以灰內瘡中蜂瘻癢漸大者熬鹽熨之三宿四日不瘥至百日成瘻其狀如四五寸石廣三寸中生蜂作孔乃有數百以石硫黃隨多少燃燭燒令汁出著瘡孔中須臾間見蜂數十惟蜂盡瘥又方人屎蛇脫灰臘月豬膏調敷之又方蜂窠灰臘月豬脂調敷孔中瘰癧瘻雄雞屎灰臘月豬脂調封之蜣螂瘻牛屎灰和臘月豬脂敷之又方蜣螂所推丸末敷之又方干牛屎末敷癢則撥卻更厚封瘥止又方熱牛屎塗之數數易應有蜣螂出蚯蚓瘻蚯蚓屎雞屎末之用社豬下頷髓和敷之蠍瘻五六孔相通者搗茅根汁著孔中蛇瘻蛇脫皮灰臘月豬脂和封之顛當瘻搗土瓜根敷至瘥慎口味雀瘻取母豬屎灰和臘月豬脂敷瘡蟲出如雀形膿瘻桃花末和豬脂封之佳石瘻兩頭出令人寒熱搗槐子和井花水封之灸漏法葶藶子二合豉一升搗令極熱作餅如大錢厚二分許取一枚當瘡孔上作大艾炷如小指大灸餅上三炷一易三餅九炷隔三日復一灸之如是頭瘡不可灸葶藶氣入腦殺人又方七月七日日未出時取麻花五月五日取艾等分合搗作炷用灸瘡上百壯亦灸瘰癧九漏灸肩井二百壯又方灸鳩尾骨下宛宛中七十壯又方繞四畔灸瘥諸惡漏中冷息肉灸足內踝上三壯二年六壯瘰癧白殭蠶治下篩服五分匕日三十日瘥又方故鞋氈替燒末五匕和酒一升平旦向日服之行須臾吐鼠三朝服又方狼屎末敷之又方五月五日取一切種種雜草煮汁洗一切瘰癧及觸處但有肉結凝似作瘻及癰癤者以獨頭蒜截兩頭留心大作艾炷隨蒜大小貼癧子上灸之勿令上破肉但取熱而已七壯一易日日灸之取消止瘻癧灸兩胯里患癧處宛宛中日一壯七日止神驗又方灸五里人迎各三十壯又方灸背兩邊腋下後紋上隨年壯又方灸耳後髮際直脈上七壯去面䵟𪒟成煉松脂為末溫酒服三合日三服盡三升無不瘥又方白附子末酒和敷之即落腳氣腫已入䏶胵小腹脹小便澀少取烏特牛尿一升一服日二取消乃止又云羸瘦人二分尿一分牛乳合煮乳結服口中瘡久不瘥入胸中並生瘡三年以上不瘥者濃煎薔薇根汁含之又稍稍咽之日三夜一冬用根夏用莖葉又方角蒿灰敷之一宿知二宿瘥有汁吐不得咽也癬搗刺薊汁服之又服地黃汁佳又燒蛇蛻一具酒服又服驢尿良又搗莨菪根蜜和敷之一無根字又方熱拓煎餅不限多少日一遍薄之良又方醋煎艾塗之又搗羊蹄根和乳塗之癭昆布二兩洗切如指大酢漬含咽汁盡愈又方海藻一斤又云三兩小麥面一升以三年酢一升面末曝乾往反酢盡搗為散酒服方寸匕日三忌努力癭上氣短氣灸肺腧百壯癭上氣胸滿灸雲門五十壯肉瘤勿治治則殺人又云不得針灸陰㿗取楊柳枝腳趾大長三尺二十枚水煮令極熱以故布及氈掩腫處取熱柳枝更互柱之如此取瘥浸淫瘡以煎餅乘熱拓之亦治濕癬又方豬牙車骨年久者椎破燒令脂出熱塗之又方取苦楝皮或枝燒作灰敷乾者豬膏塗並治小兒禿瘡諸惡瘡瘑瘡酢一升溫令沸以生薤一把內酢中封瘡上瘥止又方炒臘月糟薄之又方燒故履系末敷之又方燒松根取脂塗之燥瘑瘡酢和灰塗之又熱牛屎塗之瘑疥瘡癢不可堪羊蹄根淨去上細切熟熬以酢和熟搗淨洗瘡敷上一時間以冷水洗之日一又陰乾作末癢時搔汁出以粉之又以生蔥根揩之又方灸足大趾奇間二七壯灸大趾頭亦佳白癜平旦以手掉取韭頭露塗之極效痔第十七痔以蒲黃水服方寸匕日三良又取桑耳作羹空腹飽食之三日食佳痔下血及新產漏下好礬石一兩附子一兩末之白蜜丸如梧子大酒服二丸日三稍加不過數日便斷百日服之終身不發一方有乾薑一兩五痔十年者塗熊膽取瘥止一切方皆不及此神良又方七月七日多采槐子熟搗取汁內銅器中重綿密蓋著宅中高門上曝之二十日以上煎成如鼠屎大內穀道中日三亦主瘻及百種瘡又方痔下血及新產漏下常食萹竹葉及煮羹粥大佳又方虎頭犀角末之如雞子大和不經水豬脂大如雞子塗瘡上取瘥五痔取槐根煮洗之又方取桃根煮洗之痔出膿血有蟲傍生孔竅槐白皮一擔銼內釜中煮令味極出置大盆中適寒溫坐其中如浴狀蟲悉出冷又易之不過二三即瘥久冷五痔便血灸脊中百壯五痔便血失屎灸回氣百壯穴在脊窮骨上肛出女萎一斤以器中燒坐上熏之即時入脫肛蒲黃二兩以豬脂和敷肛上內之二三愈腸隨肛出者生栝蔞根取粉以豬脂為膏溫塗隨手抑按自得縮入冷痢脫肛枳實一枚石上磨令滑澤鑽安柄蜜塗炙令暖熨之冷更易之取縮入止又方鐵精粉內上按令入即愈又方生鐵三斤以水一斗煮取五升出鐵以汁洗日再因寒冷脫肛灸臍中隨年壯又灸橫骨百壯又方灸龜尾七壯即後窮骨是也
